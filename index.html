  const allPayments  = acc ? (acc.payments||[]) : [];
  const totalPaid    = allPayments.reduce((s,p)=>s+p.amount,0);
  const invoiceOrders= acc ? accOrders.filter(s => s.date >= invoiceRange.from && s.date <= invoiceRange.to) : [];
  const invoiceTotal = invoiceOrders.reduce((s,o) => s + o.total, 0);

  return (
    <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:16,minHeight:500}}>
      {/* Account List */}
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <strong style={{fontSize:14}}>Accounts</strong>
          <Btn small onClick={()=>setAddMode(!addMode)}>+ New</Btn>
        </div>
        {addMode && (
          <Card style={{marginBottom:12,background:C.lightGold,border:"2px solid "+C.gold,padding:12}}>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <Inp value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="Account name *"/>
              <Inp value={form.contact} onChange={v=>setForm({...form,contact:v})} placeholder="Contact person"/>
              <Inp value={form.phone} onChange={v=>setForm({...form,phone:v})} placeholder="Phone"/>
              <Inp value={form.email} onChange={v=>setForm({...form,email:v})} placeholder="Email"/>
              <Sel value={form.billingCycle} onChange={v=>setForm({...form,billingCycle:v})} options={["weekly","bi-weekly","monthly"]}/>
              <Inp value={form.notes} onChange={v=>setForm({...form,notes:v})} placeholder="Notes"/>
              <div style={{display:"flex",gap:6}}><Btn small onClick={addAccount}>Save</Btn><Btn small onClick={()=>setAddMode(false)} color={C.charcoal} outline>Cancel</Btn></div>
            </div>
          </Card>
        )}
        {accounts.length === 0 && <div style={{color:C.gray,fontSize:13,padding:20,textAlign:"center"}}>No accounts yet. Add your first account to start taking orders on credit.</div>}
        {accounts.map(a => {
          const owed = totalOwed(a);
          const isSelected = selected === a.id;
          return (
            <div key={a.id} onClick={()=>setSelected(a.id)} style={{background:isSelected?C.lightGold:C.white,border:"2px solid "+(isSelected?C.gold:C.border),borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
              <div style={{fontWeight:700,fontSize:14,color:C.dark}}>{a.name}</div>
              <div style={{fontSize:12,color:C.charcoal}}>{a.contact} - {a.billingCycle}</div>
              {owed > 0
                ? <div style={{fontSize:13,color:C.red,fontWeight:700,marginTop:4}}>Owing: {fmt(owed)}</div>
                : <div style={{fontSize:12,color:C.green,marginTop:4}}>No outstanding balance</div>
              }
            </div>
          );
        })}
      </div>

      {/* Account Detail */}
      {!acc
        ? <Card style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:C.gray}}>
            <div style={{fontSize:40}}>&#x1F4CB;</div>
            <div style={{fontSize:16,fontWeight:700}}>Select an account</div>
            <div style={{fontSize:13}}>View orders and generate invoices</div>
          </Card>
        : <div>
            <Card style={{marginBottom:14,background:C.lightGold}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{fontWeight:800,fontSize:18,color:C.dark}}>{acc.name}</div>
                  <div style={{fontSize:13,color:C.charcoal}}>{acc.contact} | {acc.phone} | {acc.email}</div>
                  {acc.notes && <div style={{fontSize:12,color:C.gray,marginTop:4}}>{acc.notes}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:24,fontWeight:800,color:C.red}}>{fmt(totalOwed(acc))}</div>
                  <div style={{fontSize:12,color:C.charcoal}}>outstanding balance</div>
                  <div style={{fontSize:12,color:C.green,fontWeight:700}}>{fmt(totalPaid)} total paid</div>
                  <div style={{fontSize:12,color:C.charcoal}}>{pendingOrders(acc).length} pending orders</div>
                </div>
              </div>
            </Card>

            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              <Btn onClick={()=>setView("orders")} color={view==="orders"?C.green:C.charcoal} outline={view!=="orders"}>Order History</Btn>
              <Btn onClick={()=>setView("payment")} color={view==="payment"?C.gold:C.charcoal} outline={view!=="payment"}>Record Payment</Btn>
              <Btn onClick={()=>setView("invoice")} color={view==="invoice"?C.blue:C.charcoal} outline={view!=="invoice"}>Generate Invoice</Btn>
              <Btn onClick={()=>setAccounts(accounts.filter(a=>a.id!==selected))} color={C.red} outline style={{marginLeft:"auto"}}>Delete Account</Btn>
            </div>

            {view === "orders" && (
              <Card style={{padding:0,overflow:"hidden"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:C.green}}>{["Date","Time","Order #","Items","Total","Status"].map(h=><th key={h} style={{color:C.white,padding:"9px 14px",textAlign:"left",fontSize:12}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {accOrders.length === 0
                      ? <tr><td colSpan={6} style={{padding:20,textAlign:"center",color:C.gray}}>No orders on this account yet. Place an order in POS and select "On Account".</td></tr>
                      : accOrders.sort((a,b)=>b.date.localeCompare(a.date)).map((o,i)=>(
                          <tr key={o.id} style={{background:i%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                            <td style={{padding:"8px 14px"}}>{o.date}</td>
                            <td style={{padding:"8px 14px",color:C.charcoal}}>{o.time}</td>
                            <td style={{padding:"8px 14px",fontWeight:700}}>#{o.orderNumber}</td>
                            <td style={{padding:"8px 14px",fontSize:12}}>{o.items.map(i=>i.qty+"x "+i.name).join(", ")}</td>
                            <td style={{padding:"8px 14px",fontWeight:700,color:C.red}}>{fmt(o.total)}</td>
                            <td style={{padding:"8px 14px"}}><Badge color={o.invoiced?C.green:C.orange}>{o.invoiced?"Invoiced":"Pending"}</Badge></td>
                          </tr>
                        ))
                    }
                  </tbody>
                </table>
              </Card>
            )}

            {view === "payment" && (
              <Card>
                <SH>Record Payment from {acc.name}</SH>
                <div style={{background:"#E8F5E9",borderRadius:8,padding:10,marginBottom:16,fontSize:13}}>
                  When this account sends a payment (e-transfer, cheque, cash), record it here. It will show in End of Day as collected revenue.
                </div>
                {pmtSaved&&<div style={{background:"#E8F5E9",border:"1px solid "+C.green,borderRadius:8,padding:10,marginBottom:12,fontWeight:700,color:C.green,textAlign:"center"}}>Payment recorded!</div>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  <div>
                    <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Amount Received (CAD)</label>
                    <Inp type="number" value={pmtAmount} onChange={setPmtAmount} placeholder="0.00"/>
                  </div>
                  <div>
                    <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Payment Method</label>
                    <Sel value={pmtMethod} onChange={setPmtMethod} options={["Transfer","Cash","Cheque","Card"]}/>
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Reference / Note (optional)</label>
                  <Inp value={pmtNote} onChange={setPmtNote} placeholder="e.g. e-transfer ref #123, invoice #4 payment..."/>
                </div>
                <Btn onClick={recordPayment} style={{width:"100%",marginBottom:16}}>Record Payment of {pmtAmount?fmt(pmtAmount):"$0.00"}</Btn>

                {allPayments.length>0&&(
                  <div>
                    <SH>Payment History</SH>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                      <thead><tr style={{background:C.green}}>{["Date","Amount","Method","Note"].map(h=><th key={h} style={{color:C.white,padding:"8px 12px",textAlign:"left",fontSize:12}}>{h}</th>)}</tr></thead>
                      <tbody>
                        {[...allPayments].reverse().map((p,i)=>(
                          <tr key={p.id} style={{background:i%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                            <td style={{padding:"8px 12px"}}>{p.date}</td>
                            <td style={{padding:"8px 12px",fontWeight:700,color:C.green}}>{fmt(p.amount)}</td>
                            <td style={{padding:"8px 12px"}}>{p.method}</td>
                            <td style={{padding:"8px 12px",fontSize:12,color:C.charcoal}}>{p.note||"--"}</td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot><tr style={{background:C.lightGold}}>
                        <td colSpan={1} style={{padding:"9px 12px",fontWeight:700}}>TOTAL PAID</td>
                        <td style={{padding:"9px 12px",fontWeight:800,color:C.green}}>{fmt(totalPaid)}</td>
                        <td colSpan={2}/>
                      </tr></tfoot>
                    </table>
                  </div>
                )}
              </Card>
            )}

            {view === "invoice" && (
              <Card>
                <SH>Generate Invoice for {acc.name}</SH>
                <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
                  <div><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>From</label><Inp type="date" value={invoiceRange.from} onChange={v=>setInvoiceRange({...invoiceRange,from:v})} style={{maxWidth:160}}/></div>
                  <div><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>To</label><Inp type="date" value={invoiceRange.to} onChange={v=>setInvoiceRange({...invoiceRange,to:v})} style={{maxWidth:160}}/></div>
                </div>

                {invoiceOrders.length === 0
                  ? <div style={{textAlign:"center",padding:30,color:C.gray,fontSize:13}}>No orders in this date range for this account.</div>
                  : (
                    <div style={{background:C.lightGold,borderRadius:10,padding:20,fontFamily:"monospace",fontSize:13}}>
                      <div style={{textAlign:"center",fontWeight:800,fontSize:16,marginBottom:4}}>INVOICE</div>
                      <div style={{textAlign:"center",fontSize:14,marginBottom:2}}>Touch of Grace Kitchen Ltd.</div>
                      <div style={{textAlign:"center",fontSize:12,color:C.charcoal,marginBottom:2}}>Sparwood Recreation Centre, Sparwood, BC</div>
                      <div style={{textAlign:"center",fontSize:12,color:C.charcoal,marginBottom:8}}>+1 (250) 433-7372</div>
                      <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Bill To:</span><strong>{acc.name}</strong></div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Contact:</span><span>{acc.contact}</span></div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Period:</span><span>{invoiceRange.from} to {invoiceRange.to}</span></div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span>Invoice Date:</span><span>{today()}</span></div>
                      <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                      <div style={{fontWeight:700,marginBottom:8}}>Order Details:</div>
                      {invoiceOrders.map(o=>(
                        <div key={o.id} style={{marginBottom:10,paddingBottom:8,borderBottom:"1px dotted "+C.border}}>
                          <div style={{display:"flex",justifyContent:"space-between"}}><strong>Order #{o.orderNumber}</strong><span>{o.date} {o.time}</span></div>
                          {o.items.map((item,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",paddingLeft:12,fontSize:12,color:C.charcoal}}>
                              <span>{item.qty}x {item.name}{item.customization?" ("+item.customization+")":""}</span>
                              <span>{fmt(item.price*item.qty)}</span>
                            </div>
                          ))}
                          <div style={{display:"flex",justifyContent:"space-between",paddingLeft:12,fontSize:12}}>
                            <span>GST + PST</span><span>{fmt(o.gst+o.pst)}</span>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",paddingLeft:12,fontWeight:700}}>
                            <span>Order Total</span><span>{fmt(o.total)}</span>
                          </div>
                        </div>
                      ))}
                      <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:800,color:C.red}}><span>TOTAL DUE</span><span>{fmt(invoiceTotal)}</span></div>
                      <div style={{textAlign:"center",fontSize:11,color:C.charcoal,marginTop:12}}>
                        Please remit payment within 7 days. E-transfer to {acc.email || "mcdonna6@hotmail.com"}.
                      </div>
                    </div>
                  )
                }
                {invoiceOrders.length > 0 && (
                  <div style={{marginTop:14,display:"flex",gap:8}}>
                    <Btn onClick={()=>window.print()} color={C.blue}>Print Invoice</Btn>
                    <div style={{fontSize:12,color:C.charcoal,alignSelf:"center"}}>Or screenshot to send by email/WhatsApp</div>
                  </div>
                )}
              </Card>
            )}
          </div>
      }
    </div>
  );
}

// -- CATERING TAB -------------------------------------------------------------
function CateringTab({cateringEvents, setCateringEvents, menu, recipes, inventory, setInventory}) {
  const [selId,      setSelId]      = useState(null);
  const [catSec,     setCatSec]     = useState("details");
  const [addMode,    setAddMode]    = useState(false);
  const [newForm,    setNewForm]    = useState({eventName:"",clientName:"",clientPhone:"",clientEmail:"",eventDate:"",guestCount:"",venue:"",notes:"",deliveryNeeded:false,quoteExpiry:"",quoteNumber:"Q-"+(100+Math.floor(Math.random()*900)),serviceChargePct:0,discountType:"none",discountValue:0});
  const [pickMenuId, setPickMenuId] = useState("");
  const [pickQty,    setPickQty]    = useState("1");
  const [pickPrice,  setPickPrice]  = useState("");
  const [pickNote,   setPickNote]   = useState("");
  const [showAddItem,setShowAddItem]= useState(false);
  const [pmtAmount,  setPmtAmount]  = useState("");
  const [pmtMethod,  setPmtMethod]  = useState("Transfer");
  const [pmtNote,    setPmtNote]    = useState("");
  const [pmtSaved,   setPmtSaved]   = useState(false);
  const [deductConf, setDeductConf] = useState(false);

  const ev = selId ? cateringEvents.find(e=>e.id===selId) : null;
  const updateEv = updates => setCateringEvents(prev=>prev.map(e=>e.id===selId?{...e,...updates}:e));

  const itemsSub    = ev ? (ev.orderItems||[]).reduce((s,i)=>s+i.qty*i.unitPrice,0) : 0;
  const svcAmt      = ev ? itemsSub*((ev.serviceChargePct||0)/100) : 0;
  const preDisc     = itemsSub + svcAmt;
  const discAmt     = ev ? (ev.discountType==="percent"?preDisc*(ev.discountValue||0)/100:ev.discountType==="fixed"?Math.min(ev.discountValue||0,preDisc):0) : 0;
  const evTotal     = preDisc - discAmt;
  const totalPaid   = ev ? (ev.payments||[]).reduce((s,p)=>s+p.amount,0) : 0;
  const outstanding = evTotal - totalPaid;

  const prodNeeds = ev ? (() => {
    const needs = {};
    (ev.orderItems||[]).forEach(item => {
      (recipes[item.menuItemId]||[]).forEach(ing => {
        const inv = inventory.find(i=>i.id===ing.invId);
        if (!inv) return;
        if (!needs[ing.invId]) needs[ing.invId]={name:inv.name,unit:inv.unit,needed:0,inStock:inv.stock};
        needs[ing.invId].needed = parseFloat((needs[ing.invId].needed + ing.qty*item.qty).toFixed(3));
      });
    });
    return Object.values(needs).sort((a,b)=>a.name.localeCompare(b.name));
  })() : [];

  const addEvent = () => {
    if (!newForm.eventName||!newForm.clientName) return;
    setCateringEvents([...cateringEvents,{...newForm,id:Date.now(),status:"Inquiry",orderItems:[],payments:[],inventoryDeducted:false,createdAt:today(),guestCount:parseInt(newForm.guestCount)||0,serviceChargePct:parseFloat(newForm.serviceChargePct)||0,discountType:"none",discountValue:0}]);
    setAddMode(false);
    setNewForm({eventName:"",clientName:"",clientPhone:"",clientEmail:"",eventDate:"",guestCount:"",venue:"",notes:"",deliveryNeeded:false,quoteExpiry:"",quoteNumber:"Q-"+(100+Math.floor(Math.random()*900)),serviceChargePct:0,discountType:"none",discountValue:0});
  };

  const addOrderItem = () => {
    const menuItem = menu.find(m=>m.id===parseInt(pickMenuId));
    if (!menuItem||!pickQty) return;
    const item={id:Date.now(),menuItemId:menuItem.id,name:menuItem.name,qty:parseInt(pickQty)||1,unitPrice:parseFloat(pickPrice)||menuItem.price,note:pickNote};
    updateEv({orderItems:[...(ev.orderItems||[]),item]});
    setPickMenuId(""); setPickQty("1"); setPickPrice(""); setPickNote(""); setShowAddItem(false);
  };

  const recordPmt = () => {
    if (!pmtAmount) return;
    const pmt={id:Date.now(),date:today(),time:nowStr(),amount:parseFloat(pmtAmount)||0,method:pmtMethod,note:pmtNote};
    updateEv({payments:[...(ev.payments||[]),pmt]});
    setPmtAmount(""); setPmtNote(""); setPmtSaved(true); setTimeout(()=>setPmtSaved(false),3000);
  };

  const deductStock = () => {
    if (!ev||ev.inventoryDeducted) return;
    setInventory(prev=>{
      const updated=prev.map(i=>({...i}));
      prodNeeds.forEach(need=>{
        const idx=updated.findIndex(i=>i.name===need.name);
        if(idx>=0) updated[idx]={...updated[idx],stock:Math.max(0,parseFloat((updated[idx].stock-need.needed).toFixed(3)))};
      });
      return updated;
    });
    updateEv({inventoryDeducted:true,deductedAt:today()+" "+nowStr()});
    setDeductConf(false);
  };

  const STATUS_COLORS={Inquiry:C.orange,Quoted:C.blue,Confirmed:C.green,"In Preparation":C.teal,Completed:"#9E9E9E",Cancelled:C.red};
  const STATUS_FLOW=["Inquiry","Quoted","Confirmed","In Preparation","Completed","Cancelled"];

  const totalDeposits = cateringEvents.filter(e=>e.depositPaid).reduce((s,e)=>s+(e.payments||[]).reduce((x,p)=>x+p.amount,0),0);
  const confirmed = cateringEvents.filter(e=>e.status==="Confirmed"||e.status==="In Preparation");

  return (
    <div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:16,minHeight:600}}>
      {/* Event List */}
      <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <Stat icon="&#x1F37D;" label="Events" val={cateringEvents.length}/>
          <Stat icon="&#x1F4CB;" label="Confirmed" val={confirmed.length} color={C.green}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <strong style={{fontSize:13}}>Catering Events</strong>
          <Btn small onClick={()=>setAddMode(!addMode)}>+ New</Btn>
        </div>
        {addMode&&(
          <Card style={{marginBottom:12,background:C.lightGold,border:"2px solid "+C.gold,padding:12}}>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <Inp value={newForm.eventName} onChange={v=>setNewForm({...newForm,eventName:v})} placeholder="Event name *"/>
              <Inp value={newForm.clientName} onChange={v=>setNewForm({...newForm,clientName:v})} placeholder="Client name *"/>
              <Inp value={newForm.clientPhone} onChange={v=>setNewForm({...newForm,clientPhone:v})} placeholder="Phone"/>
              <Inp value={newForm.clientEmail} onChange={v=>setNewForm({...newForm,clientEmail:v})} placeholder="Email"/>
              <Inp type="date" value={newForm.eventDate} onChange={v=>setNewForm({...newForm,eventDate:v})}/>
              <Inp type="number" value={newForm.guestCount} onChange={v=>setNewForm({...newForm,guestCount:v})} placeholder="Guest count"/>
              <Inp value={newForm.venue} onChange={v=>setNewForm({...newForm,venue:v})} placeholder="Venue"/>
              <Inp value={newForm.notes} onChange={v=>setNewForm({...newForm,notes:v})} placeholder="Notes"/>
              <div style={{display:"flex",gap:8}}><Btn small onClick={addEvent}>Create Event</Btn><Btn small onClick={()=>setAddMode(false)} color={C.charcoal} outline>Cancel</Btn></div>
            </div>
          </Card>
        )}
        {cateringEvents.length===0&&<div style={{color:C.gray,fontSize:13,padding:20,textAlign:"center"}}>No catering events yet.</div>}
        {[...cateringEvents].sort((a,b)=>a.eventDate.localeCompare(b.eventDate)).map(e=>{
          const ePaid=(e.payments||[]).reduce((s,p)=>s+p.amount,0);
          const eItems=(e.orderItems||[]).reduce((s,i)=>s+i.qty*i.unitPrice,0);
          return(
            <div key={e.id} onClick={()=>{setSelId(e.id);setCatSec("details");}} style={{background:selId===e.id?C.lightGold:C.white,border:"2px solid "+(selId===e.id?C.gold:C.border),borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer"}}>
              <div style={{fontWeight:700,fontSize:13}}>{e.eventName}</div>
              <div style={{fontSize:11,color:C.charcoal}}>{e.clientName} - {e.eventDate||"TBD"}</div>
              <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                <Badge small color={STATUS_COLORS[e.status]||C.charcoal}>{e.status}</Badge>
                {(e.orderItems||[]).length>0&&<Badge small color={C.blue}>{(e.orderItems||[]).length} items</Badge>}
              </div>
              {eItems>0&&<div style={{fontSize:12,color:C.green,fontWeight:700,marginTop:4}}>{fmt(eItems)} subtotal</div>}
            </div>
          );
        })}
      </div>

      {/* Event Detail */}
      {!ev
        ? <Card style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:C.gray}}>
            <div style={{fontSize:40}}>&#x1F37D;</div>
            <div style={{fontSize:16,fontWeight:700}}>Select a catering event</div>
          </Card>
        : <div>
            <Card style={{marginBottom:12,background:C.lightGold,padding:"12px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                <div>
                  <div style={{fontWeight:800,fontSize:18}}>{ev.eventName}</div>
                  <div style={{fontSize:13,color:C.charcoal}}>{ev.clientName} | {ev.clientPhone} | {ev.venue}</div>
                  <div style={{fontSize:12,color:C.charcoal,marginTop:2}}>Date: {ev.eventDate||"TBD"} | Guests: {ev.guestCount}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:800,color:outstanding>0?C.red:C.green}}>{fmt(evTotal)}</div>
                  <div style={{fontSize:12,color:C.charcoal}}>total | {fmt(outstanding)} outstanding</div>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                {STATUS_FLOW.map(s=><Btn key={s} small onClick={()=>updateEv({status:s})} color={STATUS_COLORS[s]||C.charcoal} outline={ev.status!==s}>{s}</Btn>)}
                <Btn small onClick={()=>setCateringEvents(cateringEvents.filter(e=>e.id!==selId))} color={C.red} outline style={{marginLeft:"auto"}}>Delete</Btn>
              </div>
            </Card>

            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              {[["details","Details"],["order","Order Builder"],["production","Production Sheet"],["quote","Quote / Invoice"],["payments","Payments"]].map(([k,l])=>(
                <button key={k} onClick={()=>setCatSec(k)} style={{background:catSec===k?C.green:"transparent",color:catSec===k?C.white:C.charcoal,border:"2px solid "+(catSec===k?C.green:C.border),borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{l}</button>
              ))}
            </div>

            {/* DETAILS */}
            {catSec==="details"&&(
              <Card>
                <SH>Event Details</SH>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  {[["Event Name","eventName"],["Client Name","clientName"],["Phone","clientPhone"],["Email","clientEmail"],["Venue","venue"],["Quote #","quoteNumber"]].map(([l,k])=>(
                    <div key={k}><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>{l}</label><Inp value={ev[k]||""} onChange={v=>updateEv({[k]:v})} placeholder={l}/></div>
                  ))}
                  <div><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Event Date</label><Inp type="date" value={ev.eventDate||""} onChange={v=>updateEv({eventDate:v})}/></div>
                  <div><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Guest Count</label><Inp type="number" value={ev.guestCount||""} onChange={v=>updateEv({guestCount:parseInt(v)||0})}/></div>
                  <div><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Quote Expiry</label><Inp type="date" value={ev.quoteExpiry||""} onChange={v=>updateEv({quoteExpiry:v})}/></div>
                  <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:20}}><input type="checkbox" checked={!!ev.deliveryNeeded} onChange={e=>updateEv({deliveryNeeded:e.target.checked})} id="dn"/><label htmlFor="dn" style={{fontSize:13}}>Delivery Needed</label></div>
                </div>
                <div style={{marginTop:12}}><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Notes</label><Inp value={ev.notes||""} onChange={v=>updateEv({notes:v})} placeholder="Additional notes..."/></div>
              </Card>
            )}

            {/* ORDER BUILDER */}
            {catSec==="order"&&(
              <div>
                <Card style={{marginBottom:14}}>
                  <SH>Order Items</SH>
                  {(ev.orderItems||[]).length===0&&<div style={{textAlign:"center",padding:20,color:C.gray,fontSize:13}}>No items yet. Add menu items below.</div>}
                  {(ev.orderItems||[]).map((item,i)=>(
                    <div key={item.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:"1px solid "+C.border}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:14}}>{item.name}</div>
                        {item.note&&<div style={{fontSize:12,color:C.teal}}>Note: {item.note}</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <input type="number" value={item.qty} min="1" onChange={e=>updateEv({orderItems:(ev.orderItems||[]).map((x,j)=>j===i?{...x,qty:parseInt(e.target.value)||1}:x)})}
                          style={{width:60,border:"1px solid "+C.border,borderRadius:6,padding:"5px 8px",fontSize:13,textAlign:"center"}}/>
                        <span style={{fontSize:12,color:C.charcoal}}>x</span>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:12,color:C.charcoal}}>$</span>
                          <input type="number" value={item.unitPrice} step="0.01" onChange={e=>updateEv({orderItems:(ev.orderItems||[]).map((x,j)=>j===i?{...x,unitPrice:parseFloat(e.target.value)||0}:x)})}
                            style={{width:70,border:"1px solid "+C.border,borderRadius:6,padding:"5px 8px",fontSize:13,textAlign:"right"}}/>
                        </div>
                        <span style={{fontWeight:700,color:C.green,minWidth:60,textAlign:"right"}}>{fmt(item.qty*item.unitPrice)}</span>
                        <Btn small onClick={()=>updateEv({orderItems:(ev.orderItems||[]).filter((_,j)=>j!==i)})} color={C.red} outline>X</Btn>
                      </div>
                    </div>
                  ))}
                  {showAddItem
                    ? <div style={{background:C.cream,borderRadius:8,padding:12,marginTop:10}}>
                        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 2fr",gap:8,marginBottom:8}}>
                          <div>
                            <label style={{fontSize:11,display:"block",marginBottom:3}}>Menu Item</label>
                            <select value={pickMenuId} onChange={e=>{setPickMenuId(e.target.value);const m=menu.find(x=>x.id===parseInt(e.target.value));if(m)setPickPrice(String(m.price));}} style={{width:"100%",border:"1px solid "+C.border,borderRadius:6,padding:"7px 10px",fontSize:13,background:C.white}}>
                              <option value="">-- Pick item --</option>
                              {(menu||[]).filter(m=>m.available).map(m=><option key={m.id} value={m.id}>{m.name} ({fmt(m.price)})</option>)}
                            </select>
                          </div>
                          <div><label style={{fontSize:11,display:"block",marginBottom:3}}>Qty</label><Inp type="number" value={pickQty} onChange={setPickQty} placeholder="1"/></div>
                          <div><label style={{fontSize:11,display:"block",marginBottom:3}}>Unit Price ($)</label><Inp type="number" value={pickPrice} onChange={setPickPrice} placeholder="0.00"/></div>
                          <div><label style={{fontSize:11,display:"block",marginBottom:3}}>Note (optional)</label><Inp value={pickNote} onChange={setPickNote} placeholder="e.g. no fries, mild spice"/></div>
                        </div>
                        <div style={{display:"flex",gap:8}}><Btn small onClick={addOrderItem} color={C.green}>Add to Order</Btn><Btn small onClick={()=>setShowAddItem(false)} color={C.charcoal} outline>Cancel</Btn></div>
                      </div>
                    : <Btn onClick={()=>setShowAddItem(true)} style={{marginTop:12}}>+ Add Menu Item</Btn>
                  }
                </Card>
                <Card style={{background:C.lightGold}}>
                  <SH>Pricing Summary</SH>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
                    <div><label style={{fontSize:12,display:"block",marginBottom:4}}>Service Charge (%)</label><Inp type="number" value={ev.serviceChargePct||""} onChange={v=>updateEv({serviceChargePct:parseFloat(v)||0})} placeholder="0"/></div>
                    <div><label style={{fontSize:12,display:"block",marginBottom:4}}>Discount Type</label>
                      <select value={ev.discountType||"none"} onChange={e=>updateEv({discountType:e.target.value})} style={{width:"100%",border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",fontSize:13,background:C.cream}}>
                        <option value="none">No Discount</option><option value="percent">% Off</option><option value="fixed">$ Off</option>
                      </select>
                    </div>
                    {ev.discountType&&ev.discountType!=="none"&&<div><label style={{fontSize:12,display:"block",marginBottom:4}}>Discount Value</label><Inp type="number" value={ev.discountValue||""} onChange={v=>updateEv({discountValue:parseFloat(v)||0})} placeholder="0"/></div>}
                  </div>
                  <div style={{fontSize:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Items Subtotal</span><strong>{fmt(itemsSub)}</strong></div>
                    {svcAmt>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Service Charge ({ev.serviceChargePct||0}%)</span><strong>+{fmt(svcAmt)}</strong></div>}
                    {discAmt>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4,color:C.green}}><span>Discount</span><strong>-{fmt(discAmt)}</strong></div>}
                    <hr style={{border:"1px solid "+C.border,margin:"8px 0"}}/>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:18,fontWeight:800,color:C.green}}><span>TOTAL</span><span>{fmt(evTotal)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.charcoal,marginTop:4}}><span>Paid</span><span>{fmt(totalPaid)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:14,fontWeight:700,color:outstanding>0?C.red:C.green,marginTop:4}}><span>Outstanding</span><span>{fmt(outstanding)}</span></div>
                  </div>
                </Card>
              </div>
            )}

            {/* PRODUCTION SHEET */}
            {catSec==="production"&&(
              <div>
                <Card style={{marginBottom:14,background:C.lightGold}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                    <div><SH>Production Sheet</SH><div style={{fontSize:13,color:C.charcoal}}>{ev.eventName} - {ev.eventDate||"TBD"} - {ev.guestCount} guests</div></div>
                    {ev.status==="In Preparation"&&!ev.inventoryDeducted&&(
                      <div>
                        {!deductConf
                          ? <Btn onClick={()=>setDeductConf(true)} color={C.orange}>Deduct from Inventory</Btn>
                          : <div style={{display:"flex",gap:8,alignItems:"center"}}>
                              <span style={{fontSize:13,color:C.red,fontWeight:700}}>Confirm deduction?</span>
                              <Btn onClick={deductStock} color={C.red}>Yes, Deduct</Btn>
                              <Btn onClick={()=>setDeductConf(false)} color={C.charcoal} outline>Cancel</Btn>
                            </div>
                        }
                      </div>
                    )}
                    {ev.inventoryDeducted&&<Badge color={C.green}>Inventory deducted on {ev.deductedAt}</Badge>}
                  </div>
                </Card>
                {prodNeeds.length===0
                  ? <Card><div style={{textAlign:"center",padding:30,color:C.gray}}>Add items with recipes in the Order Builder to see production needs.</div></Card>
                  : <Card style={{padding:0,overflow:"hidden"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                        <thead><tr style={{background:C.dark}}>{["Ingredient","Unit","Qty Needed","In Stock","Gap","Status"].map(h=><th key={h} style={{color:C.white,padding:"10px 12px",textAlign:"left",fontSize:11}}>{h}</th>)}</tr></thead>
                        <tbody>
                          {prodNeeds.map((n,i)=>{
                            const gap=parseFloat((n.inStock-n.needed).toFixed(3));
                            const ok=gap>=0;
                            return(
                              <tr key={i} style={{background:ok?i%2===0?C.white:C.cream:"#FFEBEE",borderBottom:"1px solid "+C.border}}>
                                <td style={{padding:"9px 12px",fontWeight:600}}>{n.name}</td>
                                <td style={{padding:"9px 12px",color:C.charcoal}}>{n.unit}</td>
                                <td style={{padding:"9px 12px",fontWeight:700,color:C.dark}}>{n.needed.toFixed(2)} {n.unit}</td>
                                <td style={{padding:"9px 12px",color:ok?C.green:C.red,fontWeight:700}}>{n.inStock} {n.unit}</td>
                                <td style={{padding:"9px 12px",fontWeight:700,color:ok?C.green:C.red}}>{gap>0?"+":""}{gap.toFixed(2)} {n.unit}</td>
                                <td style={{padding:"9px 12px"}}>{ok?<Badge small color={C.green}>OK</Badge>:<Badge small color={C.red}>SHORT {fmt(Math.abs(gap))} {n.unit}</Badge>}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </Card>
                }
                {ev.orderItems&&ev.orderItems.length>0&&(
                  <Card style={{marginTop:14}}>
                    <SH>Order Breakdown for Kitchen</SH>
                    {ev.orderItems.map((item,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border,fontSize:14}}>
                        <div><span style={{fontWeight:700}}>{item.qty}x</span> {item.name}{item.note&&<span style={{fontSize:12,color:C.teal}}> - {item.note}</span>}</div>
                        <strong>{fmt(item.qty*item.unitPrice)}</strong>
                      </div>
                    ))}
                  </Card>
                )}
              </div>
            )}

            {/* QUOTE / INVOICE */}
            {catSec==="quote"&&(
              <Card>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <SH>{ev.status==="Confirmed"||ev.status==="In Preparation"||ev.status==="Completed"?"INVOICE":"QUOTE"}</SH>
                  <Btn onClick={()=>window.print()} color={C.blue}>Print / Save PDF</Btn>
                </div>
                <div style={{background:C.lightGold,borderRadius:10,padding:20,fontFamily:"monospace",fontSize:13}}>
                  <div style={{textAlign:"center",fontWeight:800,fontSize:20,letterSpacing:2,marginBottom:4}}>{ev.status==="Confirmed"||ev.status==="In Preparation"||ev.status==="Completed"?"INVOICE":"QUOTE"}</div>
                  <div style={{textAlign:"center",fontSize:14,marginBottom:2}}>Touch of Grace Kitchen Ltd.</div>
                  <div style={{textAlign:"center",fontSize:12,color:C.charcoal,marginBottom:8}}>Sparwood Recreation Centre, Sparwood, BC | +1 (250) 433-7372</div>
                  <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>{ev.quoteNumber||"Q-001"}</span><span>Date: {today()}</span></div>
                  {ev.quoteExpiry&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:C.orange}}><span>Quote valid until:</span><span>{ev.quoteExpiry}</span></div>}
                  <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>Client:</span><strong>{ev.clientName}</strong></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>Event:</span><span>{ev.eventName}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>Date:</span><span>{ev.eventDate||"TBD"}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>Venue:</span><span>{ev.venue||"TBD"}</span></div>

                  <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                  {(ev.orderItems||[]).map((item,i)=>(

                  ))}
                  <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>Subtotal</span><span>{fmt(itemsSub)}</span></div>
                  {svcAmt>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>Service Charge ({ev.serviceChargePct||0}%)</span><span>+{fmt(svcAmt)}</span></div>}
                  {discAmt>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:3,color:C.green}}><span>Discount</span><span>-{fmt(discAmt)}</span></div>}
                  <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:16}}><span>TOTAL</span><span>{fmt(evTotal)}</span></div>
                  {totalPaid>0&&<div style={{display:"flex",justifyContent:"space-between",color:C.green,marginTop:4}}><span>Paid</span><span>{fmt(totalPaid)}</span></div>}
                  {outstanding>0&&<div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:C.red,marginTop:4}}><span>BALANCE DUE</span><span>{fmt(outstanding)}</span></div>}
                  <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
                  <div style={{textAlign:"center",fontSize:11,color:C.charcoal}}>Please remit payment to {ev.clientEmail||"mcdonna6@hotmail.com"}</div>
                  <div style={{textAlign:"center",fontSize:11,color:C.charcoal}}>Real Jamaican Flavour Made with Love</div>
                </div>
              </Card>
            )}

            {/* PAYMENTS */}
            {catSec==="payments"&&(
              <Card>
                <SH>Record Payment</SH>
                {pmtSaved&&<div style={{background:"#E8F5E9",border:"1px solid "+C.green,borderRadius:8,padding:10,marginBottom:12,fontWeight:700,color:C.green,textAlign:"center"}}>Payment recorded!</div>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  <div><label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Amount Received (CAD)</label><Inp type="number" value={pmtAmount} onChange={setPmtAmount} placeholder="0.00"/></div>
                  <div><label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Payment Method</label><Sel value={pmtMethod} onChange={setPmtMethod} options={["Transfer","Cash","Cheque","Card"]}/></div>
                </div>
                <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Reference / Note</label><Inp value={pmtNote} onChange={setPmtNote} placeholder="e.g. e-transfer ref, deposit, balance..."/></div>
                <Btn onClick={recordPmt} style={{width:"100%",marginBottom:16}}>Record Payment of {pmtAmount?fmt(pmtAmount):"$0.00"}</Btn>
                {(ev.payments||[]).length>0&&(
                  <div>
                    <SH>Payment History</SH>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                      <thead><tr style={{background:C.green}}>{["Date","Amount","Method","Note"].map(h=><th key={h} style={{color:C.white,padding:"8px 12px",textAlign:"left",fontSize:12}}>{h}</th>)}</tr></thead>
                      <tbody>
                        {[...(ev.payments||[])].reverse().map((p,i)=>(
                          <tr key={p.id} style={{background:i%2===0?C.white:C.cream}}>
                            <td style={{padding:"8px 12px"}}>{p.date}</td>
                            <td style={{padding:"8px 12px",fontWeight:700,color:C.green}}>{fmt(p.amount)}</td>
                            <td style={{padding:"8px 12px"}}>{p.method}</td>
                            <td style={{padding:"8px 12px",fontSize:12,color:C.charcoal}}>{p.note||"--"}</td>
                          </tr>
                        ))}
                      </tbody>
                      <tfoot><tr style={{background:C.lightGold}}>
                        <td colSpan={1} style={{padding:"9px 12px",fontWeight:700}}>Total Paid</td>
                        <td style={{padding:"9px 12px",fontWeight:800,color:C.green}}>{fmt(totalPaid)}</td>
                        <td colSpan={2}/>
                      </tr></tfoot>
                    </table>
                  </div>
                )}
              </Card>
            )}
          </div>
      }
    </div>
  );
}

// -- END OF DAY ---------------------------------------------------------------
function EODTab({sales, settings, refunds, setRefunds, accounts, setAccounts, staff, positions, cateringEvents}) {
  const [eodRecords,   setEodRecords, loaded] = usePersistedState("tog-eod", []);
  const [selDate,      setSelDate]      = useState(today());
  const [eodSec,       setEodSec]       = useState("balance"); // balance | transactions
  const [cashCounted,  setCashCounted]  = useState("");
  const [cardTotal,    setCardTotal]    = useState("");
  const [transferTotal,setTransferTotal]= useState("");
  const [notes,        setNotes]        = useState("");
  const [saved,        setSaved]        = useState(false);
  // Refund state
  const [refundOrder,  setRefundOrder]  = useState(null); // sale object being refunded
  const [refundReason, setRefundReason] = useState("");
  const [refundMethod, setRefundMethod] = useState("Cash");
  const [refundPin,    setRefundPin]    = useState(null); // pending refund needing PIN

  // Only PAID sales count for EOD balancing (On Account is deferred)
  const allDay     = sales.filter(s => s.date === selDate);
  const paidDay    = allDay.filter(s => s.paymentStatus !== "on-account");
  const deferredDay= allDay.filter(s => s.paymentStatus === "on-account");
  const dayRefunds = (refunds||[]).filter(r => r.date === selDate);

  // Account payments received today
  const dayAccPmts = (accounts||[]).flatMap(a => (a.payments||[]).filter(p => p.date === selDate));
  const accPmtTotal= dayAccPmts.reduce((s,p) => s + p.amount, 0);
  const dayCatPmts = (cateringEvents||[]).flatMap(e => (e.payments||[]).filter(p => p.date === selDate));
  const catPmtTotal= dayCatPmts.reduce((s,p) => s + p.amount, 0);

  const posCash    = paidDay.filter(s=>s.payMethod==="Cash").reduce((s,x)=>s+x.total,0);
  const posCard    = paidDay.filter(s=>s.payMethod==="Card Machine").reduce((s,x)=>s+x.total,0);
  const posTransf  = paidDay.filter(s=>s.payMethod==="Transfer").reduce((s,x)=>s+x.total,0);
  const posTotal   = paidDay.reduce((s,x)=>s+x.total,0) + accPmtTotal + catPmtTotal;
  const posGST     = paidDay.reduce((s,x)=>s+x.gst,0);
  const posPST     = paidDay.reduce((s,x)=>s+x.pst,0);
  const refundTotal= dayRefunds.reduce((s,r)=>s+r.amount,0);
  const netRevenue = posTotal - refundTotal;

  const cashVar    = parseFloat(cashCounted||0) - posCash;
  const cardVar    = parseFloat(cardTotal||0) - posCard;
  const balanced   = Math.abs(cashVar)<0.05 && Math.abs(cardVar)<0.05;
  const existing   = eodRecords.find(r => r.date === selDate);

  const saveEOD = () => {
    const rec = {id:Date.now(),date:selDate,posTotal,netRevenue,posCash,posCard,posTransf,accPmtTotal,
      cashCounted:parseFloat(cashCounted||0),cardTotal:parseFloat(cardTotal||0),
      transferTotal:parseFloat(transferTotal||0),cashVar,cardVar,posGST,posPST,
      refundTotal,orders:paidDay.length,notes,balanced};
    setEodRecords(prev => prev.filter(r=>r.date!==selDate).concat(rec));
    setSaved(true); setTimeout(()=>setSaved(false),3000);
  };

  const startRefund = sale => { setRefundOrder(sale); setRefundReason(""); setRefundMethod("Cash"); };
  const submitRefund = (authorizedBy) => {
    if (!refundOrder) return;
    const ref = {
      id: Date.now(), date: today(), time: nowStr(),
      originalSaleId: refundOrder.id,
      originalOrderNumber: refundOrder.orderNumber,
      items: refundOrder.items,
      amount: refundOrder.total,
      reason: refundReason,
      payMethod: refundMethod,
      authorizedBy
    };
    setRefunds(prev => [...prev, ref]);
    setRefundOrder(null); setRefundPin(null); setRefundReason(""); setRefundMethod("Cash");
  };

  if (!loaded) return <div style={{padding:40,textAlign:"center"}}>Loading...</div>;

  return (
    <div>
      {/* Manager PIN for refund */}
      {refundPin && (
        <ManagerPINModal staff={staff} positions={positions} permission="authorizeRefunds"
          action="issue this refund"
          onSuccess={name => submitRefund(name)}
          onCancel={() => { setRefundPin(null); }}/>
      )}

      {/* Refund detail modal */}
      {refundOrder && !refundPin && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.65)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Card style={{width:420,border:"2px solid "+C.red}}>
            <div style={{fontWeight:800,fontSize:17,color:C.red,marginBottom:12}}>Issue Refund - Order #{refundOrder.orderNumber}</div>
            <div style={{background:C.cream,borderRadius:8,padding:10,marginBottom:12,fontSize:13}}>
              {refundOrder.items.map((i,idx)=><div key={idx}>{i.qty}x {i.name} - {fmt(i.price*i.qty)}</div>)}
              <div style={{fontWeight:700,marginTop:6}}>Total: {fmt(refundOrder.total)}</div>
            </div>
            <div style={{background:"#FFF3E0",borderRadius:8,padding:10,marginBottom:12,fontSize:12,color:C.charcoal}}>
              Customer keeps the food. No inventory adjustment. This records the money going back.
            </div>
            <div style={{marginBottom:10}}>
              <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Reason for refund:</label>
              <Inp value={refundReason} onChange={setRefundReason} placeholder="e.g. Customer complaint, wrong order..."/>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:700,display:"block",marginBottom:4}}>Refund method:</label>
              <Sel value={refundMethod} onChange={setRefundMethod} options={["Cash","Card Reversal","Transfer"]}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>setRefundPin(true)} color={C.red} style={{flex:1}}>Refund {fmt(refundOrder.total)} - Requires Manager PIN</Btn>
              <Btn onClick={()=>setRefundOrder(null)} color={C.charcoal} outline>Cancel</Btn>
            </div>
          </Card>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
        <Stat icon="&#x1F9FE;" label="Paid Orders" val={paidDay.length}/>
        <Stat icon="&#x1F4B5;" label="Net Revenue" val={fmt(netRevenue)} color={C.green}/>
        <Stat icon="&#x1F4B4;" label="On Account (deferred)" val={fmt(deferredDay.reduce((s,x)=>s+x.total,0))} color={C.orange}/>
        <Stat icon="&#x1F519;" label="Refunds Today" val={fmt(refundTotal)} color={refundTotal>0?C.red:C.gray}/>
      </div>

      {deferredDay.length > 0 && (
        <div style={{background:"#FFF3E0",border:"1px solid "+C.orange,borderRadius:8,padding:"10px 16px",marginBottom:14,fontSize:13}}>
          <strong style={{color:C.orange}}>On Account orders NOT included in collected revenue.</strong> {deferredDay.length} order(s) worth {fmt(deferredDay.reduce((s,x)=>s+x.total,0))} deferred. Record payment in Accounts tab when received.
        </div>
      )}

      <div style={{display:"flex",gap:8,marginBottom:18,alignItems:"center"}}>
        <label style={{fontSize:13,fontWeight:600}}>Date:</label>
        <Inp type="date" value={selDate} onChange={v=>{setSelDate(v);setCashCounted("");setCardTotal("");setTransferTotal("");}} style={{maxWidth:180}}/>
        {existing&&<Badge color={existing.balanced?C.green:C.red}>{existing.balanced?"Balanced":"Variance"}</Badge>}
        <div style={{marginLeft:"auto",display:"flex",gap:8}}>
          <Btn onClick={()=>setEodSec("balance")} color={eodSec==="balance"?C.green:C.charcoal} outline={eodSec!=="balance"}>Balance Cash</Btn>
          <Btn onClick={()=>setEodSec("transactions")} color={eodSec==="transactions"?C.blue:C.charcoal} outline={eodSec!=="transactions"}>Transactions ({allDay.length})</Btn>
        </div>
      </div>

      {eodSec === "balance" && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <Card style={{background:C.lightGold}}>
            <SH>Collected Revenue ({selDate})</SH>
            {paidDay.length===0 && accPmtTotal===0
              ? <div style={{color:C.charcoal,fontSize:13,textAlign:"center",padding:20}}>No collected payments for this date.</div>
              : <div style={{fontSize:13,display:"flex",flexDirection:"column",gap:7}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span>Cash Sales</span><strong>{fmt(posCash)}</strong></div>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span>Card Machine</span><strong>{fmt(posCard)}</strong></div>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span>Transfer</span><strong>{fmt(posTransf)}</strong></div>
                  {accPmtTotal>0&&<div style={{display:"flex",justifyContent:"space-between",color:C.green}}><span>Account Payments</span><strong>{fmt(accPmtTotal)}</strong></div>}
                  {catPmtTotal>0&&<div style={{display:"flex",justifyContent:"space-between",color:C.teal}}><span>Catering Payments</span><strong>{fmt(catPmtTotal)}</strong></div>}
                  <hr style={{border:"1px solid "+C.border,margin:"2px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span>GST ({settings.taxes.gst}%)</span><strong>{fmt(posGST)}</strong></div>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span>PST ({settings.taxes.pst}%)</span><strong>{fmt(posPST)}</strong></div>
                  {refundTotal>0&&<div style={{display:"flex",justifyContent:"space-between",color:C.red,fontWeight:700}}><span>Refunds</span><span>-{fmt(refundTotal)}</span></div>}
                  <hr style={{border:"1px solid "+C.border,margin:"2px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:800,color:C.green}}><span>NET REVENUE</span><span>{fmt(netRevenue)}</span></div>
                </div>
            }
          </Card>
          <Card>
            <SH>Physical Count</SH>
            <div style={{display:"flex",flexDirection:"column",gap:10,fontSize:13}}>
              <div>
                <label style={{fontWeight:600,display:"block",marginBottom:4}}>Cash in Drawer</label>
                <Inp type="number" value={cashCounted} onChange={setCashCounted} placeholder="Count your cash total"/>
                {cashCounted&&<div style={{marginTop:4,fontWeight:700,color:Math.abs(cashVar)<0.05?C.green:C.red}}>{Math.abs(cashVar)<0.05?"Balanced":cashVar>0?"+"+fmt(cashVar)+" OVER":fmt(Math.abs(cashVar))+" SHORT"}</div>}
              </div>
              <div>
                <label style={{fontWeight:600,display:"block",marginBottom:4}}>Card Machine Total</label>
                <Inp type="number" value={cardTotal} onChange={setCardTotal} placeholder="Total from card terminal"/>
                {cardTotal&&<div style={{marginTop:4,fontWeight:700,color:Math.abs(cardVar)<0.05?C.green:C.red}}>{Math.abs(cardVar)<0.05?"Balanced":cardVar>0?"+"+fmt(cardVar)+" OVER":fmt(Math.abs(cardVar))+" SHORT"}</div>}
              </div>
              <div>
                <label style={{fontWeight:600,display:"block",marginBottom:4}}>E-Transfer Total</label>
                <Inp type="number" value={transferTotal} onChange={setTransferTotal} placeholder="Total transfers received"/>
              </div>
              {cashCounted&&cardTotal&&(
                <div style={{background:balanced?C.green+"22":C.red+"22",border:"2px solid "+(balanced?C.green:C.red),borderRadius:8,padding:10,textAlign:"center"}}>
                  <div style={{fontWeight:800,fontSize:16,color:balanced?C.green:C.red}}>{balanced?"DAY BALANCED":"VARIANCE FOUND"}</div>
                </div>
              )}
              <Inp value={notes} onChange={setNotes} placeholder="EOD notes..."/>
              <Btn onClick={saveEOD} color={balanced?C.green:C.orange}>{saved?"Saved!":"Save End of Day Record"}</Btn>
            </div>
          </Card>
        </div>
      )}

      {eodSec === "transactions" && (
        <Card style={{padding:0,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:C.green}}>
                {["#","Time","Items","Type","Payment","Discount","Total",""].map(h=>(
                  <th key={h} style={{color:C.white,padding:"9px 12px",textAlign:"left",fontSize:11}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {allDay.length===0 && (
                <tr><td colSpan={8} style={{padding:20,textAlign:"center",color:C.gray}}>No orders for this date.</td></tr>
              )}
              {allDay.sort((a,b)=>a.time.localeCompare(b.time)).map((s,i)=>{
                const isRefunded = (refunds||[]).some(r=>r.originalSaleId===s.id);
                return (
                  <tr key={s.id} style={{background:isRefunded?"#FFEBEE":i%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                    <td style={{padding:"8px 12px",fontWeight:700}}>#{s.orderNumber}</td>
                    <td style={{padding:"8px 12px"}}>{s.time}</td>
                    <td style={{padding:"8px 12px",fontSize:11}}>{s.items.map(x=>x.qty+"x "+x.name).join(", ")}</td>
                    <td style={{padding:"8px 12px"}}><Badge small color={s.paymentStatus==="on-account"?C.orange:C.green}>{s.orderType}</Badge></td>
                    <td style={{padding:"8px 12px",color:C.charcoal}}>{s.payMethod}</td>
                    <td style={{padding:"8px 12px"}}>
                      {s.discount
                        ? <Badge small color={s.discount.type==="complimentary"?C.teal:C.purple}>{s.discount.label}</Badge>
                        : <span style={{color:C.gray}}>--</span>}
                    </td>
                    <td style={{padding:"8px 12px",fontWeight:700,color:s.discount&&s.discount.type==="complimentary"?C.teal:C.green}}>{fmt(s.total)}</td>
                    <td style={{padding:"8px 12px"}}>
                      {isRefunded
                        ? <Badge small color={C.red}>Refunded</Badge>
                        : <Btn small onClick={()=>startRefund(s)} color={C.red} outline>Refund</Btn>
                      }
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {dayRefunds.length>0&&(
            <div style={{borderTop:"2px solid "+C.red,padding:12,background:"#FFEBEE"}}>
              <strong style={{fontSize:13,color:C.red}}>Refunds Today:</strong>
              {dayRefunds.map(r=>(
                <div key={r.id} style={{fontSize:12,display:"flex",gap:16,marginTop:6,color:C.charcoal}}>
                  <span style={{fontWeight:700}}>Order #{r.originalOrderNumber}</span>
                  <span style={{color:C.red,fontWeight:700}}>-{fmt(r.amount)}</span>
                  <span>{r.payMethod}</span>
                  <span>{r.reason}</span>
                  <span>Auth: {r.authorizedBy}</span>
                </div>
              ))}
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

// -- EXPENSE TRENDS VIEW (extracted component to avoid hooks-in-render) --------
function ExpenseTrendsView({expenses, settings}) {
  const [expCat, setExpCat] = useState("All");
  const [expPeriod, setExpPeriod] = useState("monthly");
  const BASE_CATS = settings && settings.expenseCategories ? settings.expenseCategories : ["Lease","Insurance","Food & Inventory","Supplies","Marketing","Utilities","Staff Wages","Licensing","Other"];
  const EXPENSE_CATS = ["All",...BASE_CATS];
  const CAT_PALETTE2 = [C.green,C.gold,C.darkGold,C.lightGreen,C.purple,C.blue,C.orange,"#AD1457",C.charcoal,C.teal,C.red,"#795548"];
  const catColor2 = cat => { const idx=BASE_CATS.indexOf(cat); return idx>=0?CAT_PALETTE2[idx%CAT_PALETTE2.length]:C.charcoal; };
  const CAT_COLORS2 = {};
  BASE_CATS.forEach(cat => { CAT_COLORS2[cat] = catColor2(cat); });

            const filtered = expCat==="All" ? expenses : expenses.filter(e=>e.cat===expCat);

            // Group by period
            const grouped = {};
            filtered.forEach(e => {
              const d = new Date(e.date);
              let key;
              if (expPeriod==="monthly") key = e.date.slice(0,7);
              else if (expPeriod==="quarterly") key = d.getFullYear()+"-Q"+(Math.ceil((d.getMonth()+1)/3));
              else key = String(d.getFullYear());
              grouped[key] = (grouped[key]||0) + e.amount;
            });
            const keys = Object.keys(grouped).sort();
            const maxVal = Math.max(...Object.values(grouped), 1);

            // Category breakdown for selected period
            const catBreakdown = {};
            filtered.forEach(e => { catBreakdown[e.cat]=(catBreakdown[e.cat]||0)+e.amount; });
            const sortedCats = Object.entries(catBreakdown).sort((a,b)=>b[1]-a[1]);

            // Running annual total
            const currentYear = new Date().getFullYear().toString();
            const yearTotal = expenses.filter(e=>e.date.startsWith(currentYear)&&(expCat==="All"||e.cat===expCat)).reduce((s,e)=>s+e.amount,0);
            const monthsElapsed = new Date().getMonth()+1;
            const projectedAnnual = monthsElapsed > 0 ? (yearTotal/monthsElapsed)*12 : 0;

            return (
              <div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}}>
                  <Stat icon="&#x1F4B8;" label={"Year to Date ("+currentYear+")"} val={fmt(yearTotal)} color={C.red}/>
                  <Stat icon="&#x1F4C8;" label="Projected Annual" val={fmt(projectedAnnual)} color={C.orange}/>
                  <Stat icon="&#x1F4CA;" label="Avg Per Month" val={fmt(monthsElapsed>0?yearTotal/monthsElapsed:0)} color={C.charcoal}/>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
                  <label style={{fontSize:13,fontWeight:600}}>Category:</label>
                  <select value={expCat} onChange={e=>setExpCat(e.target.value)} style={{border:"1px solid "+C.border,borderRadius:8,padding:"7px 12px",fontSize:13,background:C.cream}}>
                    {EXPENSE_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                  <label style={{fontSize:13,fontWeight:600}}>Group by:</label>
                  <select value={expPeriod} onChange={e=>setExpPeriod(e.target.value)} style={{border:"1px solid "+C.border,borderRadius:8,padding:"7px 12px",fontSize:13,background:C.cream}}>
                    <option value="monthly">Monthly</option>
                    <option value="quarterly">Quarterly</option>
                    <option value="annual">Annual</option>
                  </select>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:16}}>
                  <Card>
                    <SH>Spend Over Time {expCat!=="All"?"- "+expCat:""}</SH>
                    {keys.length===0
                      ? <div style={{textAlign:"center",padding:20,color:C.gray}}>No expense data yet.</div>
                      : keys.map(k=>{
                          const val=grouped[k];
                          const pct=Math.min(100,(val/maxVal)*100);
                          return(
                            <div key={k} style={{marginBottom:10}}>
                              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}>
                                <strong>{k}</strong><span style={{color:C.red,fontWeight:700}}>{fmt(val)}</span>
                              </div>
                              <div style={{background:C.cream,borderRadius:6,overflow:"hidden",height:16}}>
                                <div style={{width:pct+"%",background:C.red,height:"100%",transition:"width 0.4s"}}/>
                              </div>
                            </div>
                          );
                        })
                    }
                  </Card>
                  <Card>
                    <SH>By Category</SH>
                    {sortedCats.length===0
                      ? <div style={{textAlign:"center",padding:20,color:C.gray,fontSize:13}}>No data.</div>
                      : sortedCats.map(([cat,total])=>{
                          const pct=Math.round((total/(sortedCats.reduce((s,[_,v])=>s+v,0)))*100);
                          return(
                            <div key={cat} style={{marginBottom:8}}>
                              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}>
                                <span style={{color:CAT_COLORS2[cat]||C.charcoal,fontWeight:600}}>{cat}</span>
                                <span><strong>{fmt(total)}</strong> <span style={{color:C.gray}}>{pct}%</span></span>
                              </div>
                              <div style={{background:C.cream,borderRadius:4,overflow:"hidden",height:8}}>
                                <div style={{width:pct+"%",background:CAT_COLORS2[cat]||C.charcoal,height:"100%"}}/>
                              </div>
                            </div>
                          );
                        })
                    }
                  </Card>
                </div>
              </div>
            );
}

// -- REPORTS TAB --------------------------------------------------------------
function ReportsTab({sales, expenses, settings, refunds, accounts, menu, recipes, inventory, cateringEvents}) {

  const allAccPmts = (accounts||[]).flatMap(a => (a.payments||[]));

  paidSales.forEach(s => { const k=mKey(s.date); mRev[k]=(mRev[k]||0)+s.total; });
  allAccPmts.forEach(p => { const k=mKey(p.date); mRev[k]=(mRev[k]||0)+p.amount; });
  expenses.forEach(e => { const k=mKey(e.date); mExp[k]=(mExp[k]||0)+e.amount; });
  const allMonths = Array.from(new Set([...Object.keys(mRev),...Object.keys(mExp)])).sort();
  const mSales    = paidSales.filter(s => s.date.startsWith(selMonth));
  const allMSales = sales.filter(s => s.date.startsWith(selMonth));
  const mExps     = expenses.filter(e => e.date.startsWith(selMonth));
  const mRevenue  = mSales.reduce((s,x)=>s+x.total,0) + allAccPmts.filter(p=>p.date.startsWith(selMonth)).reduce((s,p)=>s+p.amount,0);
  const mExpTotal = mExps.reduce((s,e)=>s+e.amount,0);
  const mProfit   = mRevenue - mExpTotal;
  const mn        = parseInt(selMonth.split("-")[1]);
  const projected = proj[mn] || 0;
  const itemCounts = {};
  mSales.forEach(s => s.items.forEach(i => { if (!itemCounts[i.name]) itemCounts[i.name]={qty:0,rev:0}; itemCounts[i.name].qty+=i.qty; itemCounts[i.name].rev+=i.price*i.qty; }));
  const topItems  = Object.entries(itemCounts).sort((a,b)=>b[1].rev-a[1].rev).slice(0,8);
  const maxRev    = Math.max(...allMonths.map(m=>mRev[m]||0), 1);
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {[["monthly","Monthly Overview"],["detail","Monthly Detail"],["cost","Cost Analysis"],["expenses","Expense Trends"],["adjustments","Adjustments"],["tax","Tax Summary"]].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{background:view===v?C.green:"transparent",color:view===v?C.white:C.charcoal,border:"2px solid "+(view===v?C.green:C.border),borderRadius:8,padding:"8px 18px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{l}</button>
        ))}
        {view==="detail"&&<input type="month" value={selMonth} onChange={e=>setSelMonth(e.target.value)} style={{border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",fontSize:13,background:C.cream}}/>}
      </div>
      {view==="monthly"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}}>
            <Stat icon="&#x1F4B5;" label="Total Collected" val={fmt(paidSales.reduce((s,x)=>s+x.total,0)+allAccPmts.reduce((s,p)=>s+p.amount,0))} color={C.green}/>
            <Stat icon="&#x1F4B8;" label="Total Expenses" val={fmt(expenses.reduce((s,e)=>s+e.amount,0))} color={C.red}/>
            <Stat icon="&#x1F4C8;" label="Total Orders" val={sales.length} color={C.blue}/>
          </div>
          <Card>
            <SH>Monthly Revenue vs Projected</SH>
            {allMonths.length===0
              ? <div style={{textAlign:"center",padding:30,color:C.charcoal,fontSize:13}}>No sales data yet. Complete orders in POS to see data here.</div>
              : allMonths.map(m => {
                  const rev=mRev[m]||0; const exp=mExp[m]||0; const n=parseInt(m.split("-")[1]); const p=proj[n]||0;
                  const pct = Math.min(100, p>0?(rev/Math.max(maxRev,p))*100:0);
                  return (
                    <div key={m} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                        <strong>{MONTHS[n-1]} {m.split("-")[0]}</strong>
                        <span><span style={{color:C.green,fontWeight:700}}>{fmt(rev)}</span> / proj {fmt(p)} / exp <span style={{color:C.red}}>{fmt(exp)}</span></span>
                      </div>
                      <div style={{background:C.cream,borderRadius:6,overflow:"hidden",height:14}}>
                        <div style={{width:pct+"%",background:rev>=p?C.green:C.gold,height:"100%"}}/>
                      </div>
                      {p>0&&<div style={{fontSize:11,color:rev>=p?C.green:C.orange,marginTop:2}}>{((rev/p)*100).toFixed(0)}% of projection</div>}
                    </div>

                })

          </Card>
        </>
      )}
      {view==="detail"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>

            <Stat icon="&#x1F4B8;" label="Expenses" val={fmt(mExpTotal)} color={C.red}/>
            <Stat icon="&#x1F4C8;" label="Net Profit" val={fmt(mProfit)} color={mProfit>=0?C.green:C.red}/>

          </div>
          {topItems.length>0

            : <Card><div style={{textAlign:"center",color:C.charcoal,fontSize:13,padding:20}}>No sales data for this month yet.</div></Card>

      {view==="adjustments"&&(

            <Stat icon="&#x1F4B9;" label="Discounts Given" val={fmt(sales.filter(s=>s.discount&&s.discount.type!=="complimentary").reduce((s,x)=>s+x.discountAmt,0))} color={C.purple}/>
            <Stat icon="&#x1F4CB;" label="On Account Outstanding" val={fmt(sales.filter(s=>s.paymentStatus==="on-account").reduce((s,x)=>s+x.total,0) - allAccPmts.reduce((s,p)=>s+p.amount,0))} color={C.orange}/>

                : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{background:C.red}}>{["Date","Order #","Amount","Method","Reason","Auth"].map(h=><th key={h} style={{color:C.white,padding:"7px 10px",textAlign:"left"}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {[...(refunds||[])].sort((a,b)=>b.date.localeCompare(a.date)).map((r,i)=>(
                        <tr key={r.id} style={{background:i%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                          <td style={{padding:"6px 10px"}}>{r.date}</td>
                          <td style={{padding:"6px 10px",fontWeight:700}}>#{r.originalOrderNumber}</td>
                          <td style={{padding:"6px 10px",fontWeight:700,color:C.red}}>-{fmt(r.amount)}</td>

                          <td style={{padding:"6px 10px",fontSize:11}}>{r.reason||"--"}</td>

                      ))}
                    </tbody>
                  </table>
              }
            </Card>

            <Card>
              <SH>Complimentary & Discounts</SH>
              {sales.filter(s=>s.discount).length===0
                ? <div style={{fontSize:13,color:C.gray,textAlign:"center",padding:20}}>No discounts or complimentary orders.</div>
                : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead><tr style={{background:C.purple}}>{["Date","Order","Type","Value","Auth"].map(h=><th key={h} style={{color:C.white,padding:"7px 10px",textAlign:"left"}}>{h}</th>)}</tr></thead>
                    <tbody>
                      {sales.filter(s=>s.discount).sort((a,b)=>b.date.localeCompare(a.date)).map((s,i)=>(

                          <td style={{padding:"6px 10px"}}>{s.date}</td>
                          <td style={{padding:"6px 10px",fontWeight:700}}>#{s.orderNumber}</td>
                          <td style={{padding:"6px 10px"}}><Badge small color={s.discount.type==="complimentary"?C.teal:C.purple}>{s.discount.label}</Badge></td>
                          <td style={{padding:"6px 10px",fontWeight:700,color:s.discount.type==="complimentary"?C.teal:C.purple}}>-{fmt(s.discount.amount)}</td>
                          <td style={{padding:"6px 10px",fontSize:11,color:C.charcoal}}>{s.discount.authorizedBy||"--"}</td>

                      ))}
                    </tbody>
                  </table>
              }

          <Card>
            <SH>On Account - Outstanding Balances</SH>
            {(accounts||[]).filter(a=>{
              const owed = sales.filter(s=>s.accountId===a.id&&s.paymentStatus==="on-account").reduce((s,x)=>s+x.total,0);
              const paid = (a.payments||[]).reduce((s,p)=>s+p.amount,0);
              return (owed-paid)>0;

              ? <div style={{fontSize:13,color:C.gray,textAlign:"center",padding:20}}>All accounts are settled.</div>
              : <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:C.orange}}>{["Account","Orders Total","Payments Made","Outstanding"].map(h=><th key={h} style={{color:C.white,padding:"8px 12px",textAlign:"left"}}>{h}</th>)}</tr></thead>
                  <tbody>
                    {(accounts||[]).map((a,i)=>{
                      const owed = sales.filter(s=>s.accountId===a.id&&s.paymentStatus==="on-account").reduce((s,x)=>s+x.total,0);
                      const paid = (a.payments||[]).reduce((s,p)=>s+p.amount,0);

                      return (

                    const inv=(inventory||[]).find(x=>x.id===ing.invId);
                    if(!inv) return s;
                    const prices=Object.values(inv.prices||{});
                    if(!prices.length) return s;
                    return s + Math.min(...prices)*ing.qty;

                  const margin = item.price - cost;
                  const marginPct = item.price > 0 ? (margin/item.price)*100 : 0;
                  const sold = sales.filter(s=>s.paymentStatus!=="on-account"||true).reduce((cnt,s)=>{
                    const si=s.items.find(x=>x.id===item.id);
                    return cnt+(si?si.qty:0);

                  const profit = sold * margin;
                  const mColor = marginPct>=50?C.green:marginPct>=30?C.orange:C.red;

                      </td>
                      <td style={{padding:"8px 10px",fontWeight:600}}>{sold}</td>
                      <td style={{padding:"8px 10px",fontWeight:700,color:C.green}}>{fmt(revenue)}</td>
                      <td style={{padding:"8px 10px",fontWeight:700,color:profit>=0?C.green:C.red}}>{fmt(profit)}</td>
                    </tr>
                  );
                })}

            </table>
          </Card>
          <Card>
            <SH>Supplier Price Comparison</SH>

                </tr>
              </thead>
              <tbody>
                {(inventory||[]).map((item,i)=>{
                  const prices=item.prices||{};
                  const priceVals=Object.values(prices).filter(p=>p>0);
                  const best=priceVals.length?Math.min(...priceVals):null;
                  return(
                    <tr key={item.id} style={{background:i%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                      <td style={{padding:"8px 12px",fontWeight:600}}>{item.name}</td>
                      <td style={{padding:"8px 12px",color:C.charcoal}}>{item.unit}</td>
                      {(settings.suppliers||[]).map(s=>{
                        const p=prices[s];
                        const isBest=p&&best&&p===best;
                        return <td key={s} style={{padding:"8px 12px",fontWeight:isBest?800:400,color:isBest?C.green:p?C.charcoal:C.lightGray,background:isBest?"#E8F5E9":"transparent"}}>{p?fmt(p):"--"}</td>;
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {view==="expenses"&&(
        <ExpenseTrendsView expenses={expenses} settings={settings}/>
      )}

      {view==="tax"&&(
        <Card>
          <SH>CRA Tax Summary</SH>
          <div style={{background:"#E3F2FD",border:"1px solid #1976D2",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13}}>
            File GST/HST quarterly. PST remitted to BC separately. Keep all receipts for Input Tax Credits. Verify with your accountant before filing.
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:C.green}}>{["Month","Revenue","GST Collected","PST Collected","Expenses","GST ITC Est.","Net GST Owing"].map(h=><th key={h} style={{color:C.white,padding:"9px 12px",textAlign:"left",fontSize:12}}>{h}</th>)}</tr></thead>
            <tbody>
              {allMonths.length===0
                ? <tr><td colSpan={7} style={{padding:20,textAlign:"center",color:C.charcoal}}>No sales data yet.</td></tr>
                : allMonths.map((m,i)=>{
                    const sl=sales.filter(s=>s.date.startsWith(m));
                    const exp=mExp[m]||0;
                    const gstC=sl.reduce((s,x)=>s+x.gst,0);
                    const pstC=sl.reduce((s,x)=>s+x.pst,0);
                    const gstP=exp*0.05; const netGST=gstC-gstP;
                    return (
                      <tr key={m} style={{background:i%2===0?C.white:C.cream}}>
                        <td style={{padding:"8px 12px",fontWeight:600}}>{MONTHS[parseInt(m.split("-")[1])-1]} {m.split("-")[0]}</td>
                        <td style={{padding:"8px 12px"}}>{fmt(mRev[m]||0)}</td>
                        <td style={{padding:"8px 12px",color:C.blue,fontWeight:600}}>{fmt(gstC)}</td>
                        <td style={{padding:"8px 12px",color:C.purple,fontWeight:600}}>{fmt(pstC)}</td>
                        <td style={{padding:"8px 12px"}}>{fmt(exp)}</td>
                        <td style={{padding:"8px 12px",color:C.green}}>{fmt(gstP)}</td>
                        <td style={{padding:"8px 12px",fontWeight:700,color:netGST>0?C.red:C.green}}>{fmt(netGST)}</td>
                      </tr>
                    );
                  })
              }
            </tbody>
          </table>
          <div style={{fontSize:11,color:C.charcoal,marginTop:10}}>* GST ITC estimates assume 5% GST on expenses. Verify with your accountant.</div>
        </Card>
      )}
    </div>
  );
}
