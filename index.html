}

// -- EXPENSE CATEGORY FORM (extracted component) ------------------------------
function ExpCatForm({settings, setSettings}) {
  const [newCat, setNewCat] = useState("");
  const add = () => {
    if (!newCat.trim()) return;
    const existing = settings.expenseCategories || [];
    if (existing.includes(newCat.trim())) return;
    setSettings({...settings, expenseCategories:[...existing, newCat.trim()]});
    setNewCat("");

  return (
    <div style={{display:"flex",gap:10,width:"100%"}}>

    </div>
  );
}

  const openCustEditor = item => {
    setCustItemId(item.id);
    setCustGroups(JSON.parse(JSON.stringify(item.customGroups||[])));
    setNewGroupLabel(""); setNewGroupReq(true);
  };
  const saveCustGroups = () => {
    setMenu(menu.map(m => m.id===custItemId ? {...m,customGroups:custGroups} : m));
    setCustItemId(null);
  };
  const addGroup = () => {
    if (!newGroupLabel.trim()) return;
    setCustGroups([...custGroups,{id:Date.now(),label:newGroupLabel.trim(),required:newGroupReq,options:[]}]);
    setNewGroupLabel(""); setNewGroupReq(true);
  };
  const removeGroup = gid => setCustGroups(custGroups.filter(g=>g.id!==gid));
  const addOption = gid => {
    if (!newOptName.trim()) return;
    setCustGroups(custGroups.map(g=>g.id===gid?{...g,options:[...g.options,{name:newOptName.trim(),price:parseFloat(newOptPrice)||0}]}:g));
    setNewOptName(""); setNewOptPrice("0"); setAddingOptFor(null);
  };
  const removeOption = (gid,oname) => setCustGroups(custGroups.map(g=>g.id===gid?{...g,options:g.options.filter(o=>o.name!==oname)}:g));
  const sections = [{k:"business",l:"Business"},{k:"taxes",l:"Taxes"},{k:"menu",l:"Menu Editor"},{k:"positions",l:"Positions & Permissions"},{k:"expcat",l:"Expense Categories"},{k:"suppliers",l:"Suppliers"},{k:"projections",l:"Projections"}];
  return (
    <div style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:16}}>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {sections.map(s=>(
          <button key={s.k} onClick={()=>setSection(s.k)} style={{background:section===s.k?C.green:"transparent",color:section===s.k?C.white:C.charcoal,border:"1px solid "+(section===s.k?C.green:C.border),borderRadius:8,padding:"10px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit",textAlign:"left",fontWeight:section===s.k?700:400}}>{s.l}</button>
        ))}
      </div>
      <div>
        {section==="business"&&(
          <Card>
            <SH>Business Information</SH>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[["Business Name","name"],["Address","address"],["Phone","phone"],["Email","email"],["GST Number","gstNumber"],["PST Number","pstNumber"],["Established","established"]].map(([label,key])=>(
                <div key={key}><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>{label}</label><Inp value={(settings.business||{})[key]||""} onChange={v=>setSettings({...settings,business:{...settings.business,[key]:v}})} placeholder={label}/></div>
              ))}
            </div>
            <div style={{marginTop:14,background:"#E8F5E9",borderRadius:8,padding:10,fontSize:12,color:C.charcoal}}>Changes save automatically and persist between sessions.</div>
          </Card>
        )}
        {section==="taxes"&&(
          <Card>
            <SH>Tax Rates</SH>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>GST Rate (%)</label><Inp type="number" value={(settings.taxes||{}).gst||5} onChange={v=>setSettings({...settings,taxes:{...settings.taxes,gst:parseFloat(v)||0}})} placeholder="5"/></div>
              <div><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>PST Rate (%)</label><Inp type="number" value={(settings.taxes||{}).pst||7} onChange={v=>setSettings({...settings,taxes:{...settings.taxes,pst:parseFloat(v)||0}})} placeholder="7"/></div>
            </div>
            <div style={{background:"#E3F2FD",borderRadius:8,padding:10,fontSize:12}}>BC standard rates: GST 5% + PST 7%.</div>
          </Card>
        )}
        {section==="menu"&&(
          <div>
            {/* Customization group editor modal */}
            {custItemId && (
              <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Card style={{width:520,maxHeight:"88vh",overflow:"auto",border:"2px solid "+C.gold}}>
                  <SH>Side Choices for: {(menu.find(m=>m.id===custItemId)||{}).name}</SH>
                  <div style={{background:C.lightGold,borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:C.charcoal}}>
                    Add choice groups customers see when ordering this item (e.g. "Choose your starch"). Each group has options the customer picks from. Options can have an extra charge.
                  </div>

                  {custGroups.length === 0 && (
                    <div style={{textAlign:"center",padding:20,color:C.gray,fontSize:13}}>No choice groups yet. Add one below.</div>
                  )}

                  {custGroups.map(group => (
                    <Card key={group.id} style={{marginBottom:12,background:C.cream,border:"1px solid "+C.border}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div>
                          <strong style={{fontSize:14}}>{group.label}</strong>
                          <Badge small color={group.required?C.green:C.gray} style={{marginLeft:8}}>{group.required?"Required":"Optional"}</Badge>
                        </div>
                        <Btn small onClick={()=>removeGroup(group.id)} color={C.red} outline>Remove Group</Btn>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                        {group.options.map(opt => (
                          <div key={opt.name} style={{display:"flex",alignItems:"center",gap:4,background:C.white,border:"1px solid "+C.border,borderRadius:6,padding:"4px 10px",fontSize:12}}>
                            <span>{opt.name}{opt.price>0?" (+"+fmt(opt.price)+")":""}</span>
                            <button onClick={()=>removeOption(group.id,opt.name)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontWeight:700,fontSize:13,lineHeight:1}}>x</button>
                          </div>
                        ))}
                      </div>
                      {addingOptFor===group.id
                        ? <div style={{display:"flex",gap:8,alignItems:"center"}}>
                            <Inp value={newOptName} onChange={setNewOptName} placeholder="Option name" style={{flex:2}}/>
                            <Inp type="number" value={newOptPrice} onChange={setNewOptPrice} placeholder="Extra $" style={{width:80}}/>
                            <Btn small onClick={()=>addOption(group.id)}>Add</Btn>
                            <Btn small onClick={()=>setAddingOptFor(null)} color={C.charcoal} outline>Cancel</Btn>
                          </div>
                        : <Btn small onClick={()=>{setAddingOptFor(group.id);setNewOptName("");setNewOptPrice("0");}} color={C.blue} outline>+ Add Option</Btn>
                      }
                    </Card>
                  ))}

                  <Card style={{background:C.lightGold,border:"1px dashed "+C.gold,marginBottom:14}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:C.dark}}>Add a new choice group:</div>
                    <div style={{display:"flex",gap:8,marginBottom:8}}>
                      <Inp value={newGroupLabel} onChange={setNewGroupLabel} placeholder='e.g. "Choose your starch"' style={{flex:1}}/>
                      <div style={{display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
                        <input type="checkbox" checked={newGroupReq} onChange={e=>setNewGroupReq(e.target.checked)} id="greq"/>
                        <label htmlFor="greq" style={{fontSize:12}}>Required</label>
                      </div>
                      <Btn small onClick={addGroup}>Add Group</Btn>
                    </div>
                    <div style={{fontSize:11,color:C.charcoal}}>After adding the group, add options to it above (e.g. "Rice & Peas", "White Rice").</div>
                  </Card>

                  <div style={{display:"flex",gap:8}}>
                    <Btn onClick={saveCustGroups} style={{flex:1}}>Save Choices</Btn>
                    <Btn onClick={()=>setCustItemId(null)} color={C.charcoal} outline>Cancel</Btn>
                  </div>
                </Card>
              </div>
            )}

            <Card style={{marginBottom:14}}>
              <SH>Add New Menu Item</SH>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                <Inp value={menuForm.name} onChange={v=>setMenuForm({...menuForm,name:v})} placeholder="Item name *"/>
                <Sel value={menuForm.cat} onChange={v=>setMenuForm({...menuForm,cat:v})} options={MENU_CATS}/>
                <Inp type="number" value={menuForm.price} onChange={v=>setMenuForm({...menuForm,price:v})} placeholder="Price ($) *"/>
                <Inp value={menuForm.allergens} onChange={v=>setMenuForm({...menuForm,allergens:v})} placeholder="Allergens (comma separated)"/>
                <Inp value={menuForm.comesWith} onChange={v=>setMenuForm({...menuForm,comesWith:v})} placeholder="Comes with (comma separated)"/>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{display:"flex",gap:6}}><input type="checkbox" checked={menuForm.available} onChange={e=>setMenuForm({...menuForm,available:e.target.checked})} id="mav"/><label htmlFor="mav" style={{fontSize:12}}>Available now</label></div>
                  <Btn small onClick={addMenuItem} color={C.green}>Add Item</Btn>
                </div>
              </div>
              <div style={{fontSize:12,color:C.charcoal,background:C.cream,borderRadius:6,padding:8}}>
                After adding, use the "Side Choices" button on the item row to set up any customer choices (starch, protein add-ons, etc).
              </div>
            </Card>

            <Card style={{padding:0,overflow:"hidden"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:C.green}}>{["Item","Cat","Price","Comes With","Side Choices","Status",""].map(h=><th key={h} style={{color:C.white,padding:"8px 12px",textAlign:"left"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {menu.map((item,i)=>(
                    <tr key={item.id} style={{background:i%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                      <td style={{padding:"8px 12px",fontWeight:600}}>{item.name}</td>
                      <td style={{padding:"8px 12px"}}><Badge small>{item.cat}</Badge></td>
                      <td style={{padding:"8px 12px",fontWeight:700,color:C.green}}>{fmt(item.price)}</td>
                      <td style={{padding:"8px 12px",fontSize:11,color:C.teal}}>{(item.comesWith||[]).join(", ")||"--"}</td>
                      <td style={{padding:"8px 12px"}}>
                        {(item.customGroups||[]).length > 0
                          ? <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <Badge small color={C.green}>{(item.customGroups||[]).length} group{(item.customGroups||[]).length>1?"s":""}</Badge>
                              <Btn small onClick={()=>openCustEditor(item)} color={C.gold}>Edit</Btn>
                            </div>
                          : <Btn small onClick={()=>openCustEditor(item)} color={C.blue} outline>+ Add</Btn>
                        }
                      </td>
                      <td style={{padding:"8px 12px"}}>
                        <button onClick={()=>setMenu(menu.map(m=>m.id===item.id?{...m,available:!m.available}:m))} style={{background:item.available?C.green:C.red,color:C.white,border:"none",borderRadius:12,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}>{item.available?"Available":"Hidden"}</button>
                      </td>
                      <td style={{padding:"8px 12px"}}><Btn small onClick={()=>setMenu(menu.filter(m=>m.id!==item.id))} color={C.red} outline>Del</Btn></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          </div>
        )}
        {section==="positions"&&(
          <div>
            <Card style={{marginBottom:14,background:C.lightGold,border:"2px solid "+C.gold}}>
              <SH>Add New Position</SH>
              <NewPositionForm positions={positions} setPositions={setPositions}/>
            </Card>
            {(positions||POSITIONS_INIT).map(pos=>(
              <Card key={pos.id} style={{marginBottom:12,borderLeft:"4px solid "+(pos.color||C.charcoal)}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div>
                    <strong style={{fontSize:15,color:pos.color||C.dark}}>{pos.name}</strong>
                    <div style={{fontSize:11,color:C.gray,marginTop:2}}>
                      {PERMISSIONS.filter(p=>pos.permissions&&pos.permissions[p.key]).length} permission(s) granted
                    </div>
                  </div>
                  {pos.id>5&&<Btn small onClick={()=>setPositions((positions||POSITIONS_INIT).filter(p=>p.id!==pos.id))} color={C.red} outline>Delete</Btn>}
                  {pos.id<=5&&<span style={{fontSize:11,color:C.gray}}>Default</span>}
                </div>
                {["Tab Access","Actions"].map(group=>{
                  const groupPerms=PERMISSIONS.filter(p=>p.group===group);
                  return(
                    <div key={group} style={{marginBottom:12}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.charcoal,textTransform:"uppercase",letterSpacing:1,marginBottom:8,paddingBottom:4,borderBottom:"1px solid "+C.border}}>{group}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        {groupPerms.map(perm=>{
                          const granted=pos.permissions&&pos.permissions[perm.key];
                          return(
                            <div key={perm.key} onClick={()=>setPositions((positions||POSITIONS_INIT).map(p=>p.id===pos.id?{...p,permissions:{...(p.permissions||{}),[perm.key]:!granted}}:p))}
                              style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,cursor:"pointer",background:granted?pos.color+"22":C.cream,border:"1px solid "+(granted?pos.color:C.border)}}>
                              <div style={{width:14,height:14,borderRadius:3,background:granted?(pos.color||C.green):C.white,border:"2px solid "+(granted?(pos.color||C.green):C.border),display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:C.white,fontWeight:800,flexShrink:0}}>{granted?"v":""}</div>
                              <span style={{fontSize:11,color:granted?(pos.color||C.dark):C.charcoal,fontWeight:granted?700:400}}>{perm.label}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </Card>
            ))}
          </div>
        )}

        {section==="expcat"&&(
          <Card>
            <SH>Expense Categories</SH>
            <div style={{background:C.lightGold,borderRadius:8,padding:10,marginBottom:16,fontSize:13,color:C.charcoal}}>
              Add custom expense types here. They appear in the Expenses tab dropdown and Reports automatically. Built-in categories can be removed if not needed.
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              {(()=>{
                // We need a sub-component for this to avoid hooks violation
                // Actually we can use a simple controlled form here since it's inside a function body
                return null; // handled by ExpCatForm below
              })()}
              <ExpCatForm settings={settings} setSettings={setSettings}/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(settings.expenseCategories||[]).map((cat,i)=>(
                <div key={cat+i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.cream,borderRadius:8,padding:"10px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:12,height:12,borderRadius:3,background:[C.green,C.gold,C.darkGold,C.lightGreen,C.purple,C.blue,C.orange,"#AD1457",C.charcoal,C.teal][i%10]}}/>
                    <span style={{fontWeight:600,fontSize:14}}>{cat}</span>
                  </div>
                  <Btn small onClick={()=>setSettings({...settings,expenseCategories:(settings.expenseCategories||[]).filter((_,j)=>j!==i)})} color={C.red} outline>Remove</Btn>
                </div>
              ))}
            </div>
          </Card>
        )}

        {section==="suppliers"&&(
          <Card>
            <SH>Suppliers</SH>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <Inp value={newSupplier} onChange={setNewSupplier} placeholder="New supplier name"/>
              <Btn onClick={()=>{if(newSupplier.trim()){setSettings({...settings,suppliers:[...(settings.suppliers||[]),newSupplier.trim()]});setNewSupplier("");}}} style={{whiteSpace:"nowrap"}}>Add</Btn>
            </div>
            {(settings.suppliers||[]).map(s=>(
              <div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.cream,borderRadius:8,padding:"10px 14px",marginBottom:8}}>
                <span style={{fontWeight:600}}>{s}</span>
                <Btn small onClick={()=>setSettings({...settings,suppliers:(settings.suppliers||[]).filter(x=>x!==s)})} color={C.red} outline>Remove</Btn>
              </div>
            ))}
          </Card>
        )}
        {section==="projections"&&(
          <Card>
            <SH>Monthly Revenue Projections</SH>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {MONTHS.map((m,i)=>(
                <div key={m}><label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>{m} (Month {i+1})</label><Inp type="number" value={(settings.projections||{})[i+1]||""} onChange={v=>setSettings({...settings,projections:{...(settings.projections||{}),[i+1]:parseFloat(v)||0}})} placeholder="0.00"/></div>
              ))}
            </div>
            <div style={{marginTop:14,background:"#E8F5E9",borderRadius:8,padding:12,fontSize:13}}>
              Year 1 Projected Total: {fmt(Object.values(settings.projections||{}).reduce((s,v)=>s+v,0))} (target: $132,860)
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

// -- APP ROOT -----------------------------------------------------------------
const TABS = [
  {key:"pos",     icon:"&#x1F9FE;", label:"POS"},
  {key:"kitchen", icon:"&#x1F373;", label:"Kitchen"},
  {key:"inventory",icon:"&#x1F4E6;",label:"Inventory"},
  {key:"expenses",icon:"&#x1F4B8;", label:"Expenses"},
  {key:"staff",   icon:"&#x1F465;", label:"Staff"},
  {key:"catering",icon:"&#x1F37D;", label:"Catering"},
  {key:"accounts",icon:"&#x1F4CB;", label:"Accounts"},
  {key:"eod",     icon:"&#x1F305;", label:"End of Day"},
  {key:"reports", icon:"&#x1F4CA;", label:"Reports"},
  {key:"settings",icon:"&#x2699;",  label:"Settings"},
];

function App() {
  const [tab,          setTab]                    = useState("pos");
  const [settings,     setSettings,  sLoaded]     = usePersistedState("tog-settings",  DEFAULT_SETTINGS);
  const [menu,         setMenu,      mLoaded]     = usePersistedState("tog-menu",       MENU_INIT);
  const [sales,        setSales,     salLoaded]   = usePersistedState("tog-sales",      []);
  const [expenses,     setExpenses,  expLoaded]   = usePersistedState("tog-expenses",   EXPENSES_INIT);
  const [accounts,     setAccounts,  accLoaded]   = usePersistedState("tog-accounts",   ACCOUNTS_INIT);
  const [inventory,    setInventory, invLoaded]   = usePersistedState("tog-inventory",  INVENTORY_INIT);
  const [recipes,      setRecipes,   recLoaded]   = usePersistedState("tog-recipes",    RECIPES_INIT);
  const [refunds,        setRefunds,       refLoaded]    = usePersistedState("tog-refunds",    []);
  const [cateringEvents, setCateringEvents, catLoaded]    = usePersistedState("tog-catering",   CATERING_INIT);
  const [staff,        setStaff,     staffLoaded]  = usePersistedState("tog-staff",      STAFF_INIT);
  const [positions,    setPositions, posLoaded]    = usePersistedState("tog-positions",  POSITIONS_INIT);
  const [kitchenOrders, setKitchenOrders]          = useSharedState("tog-kitchen-queue", []);
  // Tab session hooks MUST be before early return (Rules of Hooks)
  const [tabSessions, setTabSessions] = useState({});
  const [pendingTab,  setPendingTab]  = useState(null);

  const allLoaded = sLoaded && mLoaded && salLoaded && expLoaded && accLoaded && invLoaded && recLoaded && refLoaded && staffLoaded && posLoaded;
  if (!allLoaded) return <LoadingScreen/>;

  const TAB_PERM_KEY = {
    pos:null, kitchen:null, inventory:"accessInventory",
    expenses:"accessExpenses", staff:"accessStaff", catering:"accessCatering",
    accounts:"accessAccounts", eod:"accessEOD", reports:"accessReports", settings:"accessSettings"
  };

  const handleTabClick = key => {
    const perm = TAB_PERM_KEY[key];
    if (!perm) { setTab(key); return; }
    if (tabSessions[key]) { setTab(key); return; }
    setPendingTab(key);
  };

  const invSession = tabSessions["inventory"];
  const canSeeRecipes = invSession ? (invSession.positionId === 1 || (() => {
    const pos = (positions||POSITIONS_INIT).find(p => p.id === invSession.positionId);
    return !!(pos && pos.permissions && pos.permissions.accessRecipes);
  })()) : false;

  const deductInventory = saleItems => {
    setInventory(prev => {
      const updated = prev.map(i => ({...i}));
      saleItems.forEach(saleItem => {
        const recipe = recipes[saleItem.id] || [];
        recipe.forEach(ing => {
          const idx = updated.findIndex(i => i.id === ing.invId);
          if (idx >= 0) {
            const newStock = Math.max(0, parseFloat((updated[idx].stock - ing.qty * saleItem.qty).toFixed(4)));
            updated[idx] = {...updated[idx], stock: newStock};
          }
        });
      });
      return updated;
    });
  };

  const handleSale = sale => {
    setSales(prev => [...prev, sale]);
    deductInventory(sale.items);
  };

  const newOrderCount   = kitchenOrders.filter(o=>o.status==="new").length;
  const readyOrderCount = kitchenOrders.filter(o=>o.status==="ready").length;

  return (
    <div style={{minHeight:"100vh",background:"#F0EBE0",fontFamily:"Georgia,serif"}}>
      {/* Tab PIN gate */}
      {pendingTab && (
        <ManagerPINModal
          staff={staff}
          positions={positions||POSITIONS_INIT}
          permission={TAB_PERM_KEY[pendingTab]}
          action={"access " + (TABS.find(t=>t.key===pendingTab)||{}).label}
          onSuccess={(name, posId) => {
            setTabSessions(prev => ({...prev, [pendingTab]:{name, positionId:posId}}));
            setTab(pendingTab);
            setPendingTab(null);
          }}
          onCancel={() => setPendingTab(null)}
        />
      )}
      <div style={{background:C.dark,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.4)"}}>
        <div style={{width:"100%",padding:"0 24px",boxSizing:"border-box"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 0 0",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:48,height:48,background:C.gold,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>&#x1F37D;</div>
              <div>
                <div style={{color:C.gold,fontWeight:800,fontSize:20,letterSpacing:0.5}}>{settings.business.name}</div>
                <div style={{color:"#888",fontSize:12}}>Sparwood, BC - Est. {settings.business.established}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"center",fontSize:12,flexWrap:"wrap"}}>
              {newOrderCount > 0 && <span style={{background:C.red,color:C.white,borderRadius:20,padding:"2px 10px",fontWeight:700,fontSize:12}}>{newOrderCount} new order{newOrderCount>1?"s":""}</span>}
              {readyOrderCount > 0 && <span style={{background:C.green,color:C.white,borderRadius:20,padding:"2px 10px",fontWeight:700,fontSize:12}}>{readyOrderCount} ready</span>}
              <span style={{color:"#888"}}>Auto-saving</span>
              <span style={{color:"#888"}}>{new Date().toLocaleDateString("en-CA",{weekday:"short",month:"short",day:"numeric"})}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:4,overflowX:"auto",marginTop:4}}>
            {TABS.map(t=>{
              const isKitchen = t.key==="kitchen";
              const badge = isKitchen && newOrderCount > 0 ? newOrderCount : null;
              const permKey = TAB_PERM_KEY[t.key];
              const locked = permKey && !tabSessions[t.key];
              return (
                <button key={t.key} onClick={()=>handleTabClick(t.key)}
                  style={{background:tab===t.key?C.gold:"transparent",color:tab===t.key?C.dark:locked?"#555":"#bbb",border:"none",borderRadius:"8px 8px 0 0",padding:"12px 18px",cursor:"pointer",fontSize:14,fontWeight:tab===t.key?800:500,fontFamily:"inherit",whiteSpace:"nowrap",position:"relative",opacity:locked?0.7:1}}>
                  {locked && <span style={{fontSize:11,marginRight:4}}>&#x1F512;</span>}
                  <span dangerouslySetInnerHTML={{__html:t.icon}}/>{" "}{t.label}
                  {tabSessions[t.key]&&!locked&&<span style={{display:"block",fontSize:10,color:"#888",lineHeight:1,marginTop:2}}>{tabSessions[t.key].name.split(" ")[0]}</span>}
                  {badge && <span style={{position:"absolute",top:4,right:4,background:C.red,color:C.white,borderRadius:"50%",width:16,height:16,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{badge}</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{width:"100%",padding:"24px 32px",boxSizing:"border-box"}}>
        {tab==="pos"      && <POSTab menu={menu} settings={settings} onSaleComplete={handleSale} accounts={accounts} kitchenOrders={kitchenOrders} setKitchenOrders={setKitchenOrders} staff={staff} positions={positions}/>}
        {tab==="kitchen"  && <KitchenTab kitchenOrders={kitchenOrders} setKitchenOrders={setKitchenOrders}/>}
        {tab==="inventory"&& <InventoryTab inventory={inventory} setInventory={setInventory} settings={settings} setSettings={setSettings} menu={menu} recipes={recipes} setRecipes={setRecipes} canSeeRecipes={canSeeRecipes}/>}
        {tab==="expenses" && <ExpensesTab expenses={expenses} setExpenses={setExpenses} settings={settings}/>}
        {tab==="staff"    && <StaffTab staff={staff} setStaff={setStaff} positions={positions}/>}
        {tab==="catering" && <CateringTab cateringEvents={cateringEvents} setCateringEvents={setCateringEvents} menu={menu} recipes={recipes} inventory={inventory} setInventory={setInventory}/>}
        {tab==="accounts" && <AccountsTab accounts={accounts} setAccounts={setAccounts} sales={sales}/>}
        {tab==="eod"      && <EODTab sales={sales} settings={settings} refunds={refunds} setRefunds={setRefunds} accounts={accounts} setAccounts={setAccounts} staff={staff} positions={positions} cateringEvents={cateringEvents}/>}
        {tab==="reports"  && <ReportsTab sales={sales} expenses={expenses} settings={settings} refunds={refunds} accounts={accounts} menu={menu} recipes={recipes} inventory={inventory} cateringEvents={cateringEvents}/>}
        {tab==="settings" && <SettingsTab settings={settings} setSettings={setSettings} menu={menu} setMenu={setMenu} positions={positions} setPositions={setPositions}/>}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
