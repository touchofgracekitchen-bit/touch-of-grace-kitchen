<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Touch of Grace Kitchen</title>
  <style>body{font-family:Georgia,serif;background:#F0EBE0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    function App() {
      const [count, setCount] = React.useState(0);
      return (
        <div style={{textAlign:'center',padding:40}}>
          <div style={{fontSize:40,marginBottom:16}}>🍽️</div>
          <h1 style={{color:'#1A1208',marginBottom:8}}>Touch of Grace Kitchen</h1>
          <p style={{color:'#666',marginBottom:20}}>App is loading correctly!</p>
          <button onClick={() => setCount(count+1)} style={{background:'#1B5E20',color:'white',border:'none',borderRadius:8,padding:'12px 24px',fontSize:16,cursor:'pointer'}}>
            Tapped {count} times
          </button>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
