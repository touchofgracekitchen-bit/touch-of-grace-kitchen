const { useState, useEffect } = React;

function usePersistedState(key, def) {
  const lsKey = 'tog_' + key;
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(lsKey); if (s !== null) return JSON.parse(s); } catch(e) {}
    return def;
  });
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    dbLoad(key).then(remote => {
      if (remote !== null && remote !== undefined) {
        setVal(remote);
        try { localStorage.setItem(lsKey, JSON.stringify(remote)); } catch(e) {}
      }
      setLoaded(true);
    });
    const t = setInterval(() => {
      dbLoad(key).then(remote => {
        if (remote !== null && remote !== undefined) {
          setVal(remote);
          try { localStorage.setItem(lsKey, JSON.stringify(remote)); } catch(e) {}
        }
      });
    }, 30000);
    return () => clearInterval(t);
  }, [key]);
  const save = (fn) => setVal(prev => {
    const next = typeof fn === 'function' ? fn(prev) : fn;
    try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch(e) {}
    dbSave(key, next);
    return next;
  });
  return [val, save, loaded];
}

function useSharedState(key, def) {
  const lsKey = 'tog_shared_' + key;
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(lsKey); if (s !== null) return JSON.parse(s); } catch(e) {}
    return def;
  });
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    dbLoad(key).then(remote => {
      if (remote !== null && remote !== undefined) {
        setVal(remote);
        try { localStorage.setItem(lsKey, JSON.stringify(remote)); } catch(e) {}
      }
      setLoaded(true);
    });
    let channel = null;
    if (db) {
      try {
        channel = db.channel('rt_' + key)
          .on('postgres_changes',
            {event: '*', schema: 'public', table: 'tog_data', filter: 'key=eq.' + key},
            (payload) => {
              if (payload.new && payload.new.value !== undefined) {
                setVal(payload.new.value);
                try { localStorage.setItem(lsKey, JSON.stringify(payload.new.value)); } catch(e) {}
              }
            }).subscribe();
      } catch(e) { console.warn('Realtime failed:', e.message); }
    }
    const t = setInterval(() => {
      dbLoad(key).then(remote => { if (remote !== null && remote !== undefined) setVal(remote); });
    }, 4000);
    return () => {
      clearInterval(t);
      if (channel && db) { try { db.removeChannel(channel); } catch(e) {} }
    };
  }, [key]);
  const save = (fn) => setVal(prev => {
    const next = typeof fn === 'function' ? fn(prev) : fn;
    try { localStorage.setItem(lsKey, JSON.stringify(next)); } catch(e) {}
    dbSave(key, next);
    return next;
  });
  return [val, save, loaded];
}

// -- MANAGER PIN MODAL --------------------------------------------------------
// permission: "authorizeDiscounts" | "authorizeRefunds" | "manageMenu" | etc.
function ManagerPINModal({staff, positions, permission, action, onSuccess, onCancel}) {
  const [pin,   setPin]   = useState("");
  const [error, setError] = useState("");

  // Find staff members whose position has this permission
  const authorized = (staff||[]).filter(s => {
    const pos = (positions||POSITIONS_INIT).find(p => p.id === s.positionId);
    return pos && pos.permissions && pos.permissions[permission];
  });

  const verify = () => {
    if (!pin) { setError("Please enter a PIN."); return; }
    const match = authorized.find(m => m.pin === pin);
    if (match) { onSuccess(match.name, match.positionId); }
    else { setError("Wrong PIN, or this role cannot " + action + "."); setPin(""); }
  };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <Card style={{width:340,textAlign:"center",border:"2px solid "+C.gold}}>
        <div style={{fontSize:22,marginBottom:6}}>&#x1F512;</div>
        <div style={{fontWeight:800,fontSize:16,marginBottom:4}}>Authorization Required</div>
        <div style={{fontSize:13,color:C.charcoal,marginBottom:16}}>Enter your PIN to {action}.</div>
        <Inp type="password" value={pin} onChange={v=>{setPin(v);setError("");}} placeholder="Your PIN"
          style={{textAlign:"center",letterSpacing:8,fontSize:20,marginBottom:8}}/>
        {error && <div style={{color:C.red,fontSize:12,marginBottom:8}}>{error}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:12}}>
          <Btn onClick={verify}>Confirm</Btn>
          <Btn onClick={onCancel} color={C.charcoal} outline>Cancel</Btn>
        </div>
        <div style={{fontSize:11,color:C.gray,padding:"6px 0",borderTop:"1px solid "+C.border}}>
          {authorized.length > 0
            ? "Authorized: " + authorized.map(m=>m.name.split(" ")[0]).join(", ")
            : "No one has permission for this. Check Staff tab."}
        </div>
      </Card>
    </div>
  );
}

// -- CUSTOMIZATION MODAL ------------------------------------------------------
function CustomizeModal({item, onConfirm, onCancel}) {
  const groups = item.customGroups || [];
  // selections[groupId] = chosen option name
  const initSelections = () => {
    const s = {};
    groups.forEach(g => { s[g.id] = g.options.length > 0 ? g.options[0].name : ""; });
    return s;
  };
  const [selections, setSelections] = useState(initSelections);
  const [request, setRequest] = useState("");

  const extraPrice = groups.reduce((sum, g) => {
    const chosen = g.options.find(o => o.name === selections[g.id]);
    return sum + (chosen ? chosen.price : 0);
  }, 0);

  const confirm = () => {
    const parts = groups
      .map(g => selections[g.id])
      .filter(Boolean)
      .filter(s => s !== "No thanks" && s !== "No protein");
    const note = [...parts, request].filter(Boolean).join(" | ");
    onConfirm({...item, price: item.price + extraPrice, customization: note || null});
  };

  if (groups.length === 0) {
    // No customization needed - just add directly (shouldn't normally reach here)
    onConfirm({...item, customization: null});
    return null;
  }

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <Card style={{width:440,maxHeight:"85vh",overflow:"auto",border:"2px solid "+C.gold}}>
        <div style={{fontWeight:800,fontSize:17,color:C.dark,marginBottom:4}}>{item.name}</div>
        <div style={{fontSize:13,color:C.charcoal,marginBottom:16}}>
          {(item.comesWith||[]).map(c=><span key={c} style={{marginRight:8,color:C.teal}}>+ {c}</span>)}
        </div>
        {groups.map(group => (
          <div key={group.id} style={{marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:C.dark}}>
              {group.label}
              {!group.required && <span style={{fontWeight:400,color:C.gray,marginLeft:6,fontSize:12}}>(optional)</span>}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {group.options.map(opt => {
                const isSelected = selections[group.id] === opt.name;
                return (
                  <button key={opt.name} onClick={()=>setSelections({...selections,[group.id]:opt.name})}
                    style={{padding:"9px 16px",border:"2px solid "+(isSelected?C.green:C.border),borderRadius:8,background:isSelected?C.green:C.white,color:isSelected?C.white:C.dark,fontWeight:600,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                    {opt.name}{opt.price>0?" (+"+fmt(opt.price)+")":""}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
        <div style={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:12,marginBottom:6,color:C.charcoal}}>Special request (optional):</div>
          <Inp value={request} onChange={setRequest} placeholder="e.g. less spice, no coleslaw..."/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={confirm} style={{flex:1}}>
            Add to Order - {fmt(item.price + extraPrice)}
          </Btn>
          <Btn onClick={onCancel} color={C.charcoal} outline>Cancel</Btn>
        </div>
      </Card>
    </div>
  );
}

// -- POS TAB ------------------------------------------------------------------
function POSTab({menu, settings, onSaleComplete, accounts, kitchenOrders, setKitchenOrders, staff, positions}) {
  const [order,        setOrder]        = useState([]);
  const [note,         setNote]         = useState("");
  const [orderType,    setOrderType]    = useState("Dine-in");
  const [payMethod,    setPayMethod]    = useState("Card Machine");
  const [cashGiven,    setCashGiven]    = useState("");
  const [accountId,    setAccountId]    = useState("");
  const [filterCat,    setFilterCat]    = useState("All");
  const [customItem,   setCustomItem]   = useState(null);
  const [receipt,      setReceipt]      = useState(null);
  const [orderNum,     setOrderNum]     = useState(() => 100 + Math.floor(Math.random()*900));
  // Discount state
  const [showDiscount,  setShowDiscount]  = useState(false);
  const [discountType,  setDiscountType]  = useState("percent");
  const [discountValue, setDiscountValue] = useState("");
  const [discountItemIdx, setDiscountItemIdx] = useState("");
  // Complimentary state
  const [isComp,       setIsComp]       = useState(false);
  const [compAuth,     setCompAuth]     = useState(null);
  // Manager PIN gate: "discount" | "complimentary" | null
  const [pinGate,      setPinGate]      = useState(null);

  const gst  = settings.taxes.gst / 100;
  const pst  = settings.taxes.pst / 100;
  const cats = ["All", ...Array.from(new Set(menu.filter(m=>m.available).map(m=>m.cat)))];
  const visible = menu.filter(m => m.available && (filterCat==="All" || m.cat===filterCat));

  const subtotal = order.reduce((s,i) => s + i.price * i.qty, 0);

  // Discount calculation
  let discountAmt = 0;
  let discountLabel = "";
  if (isComp) {
    discountAmt = subtotal;
    discountLabel = "Complimentary";
  } else if (showDiscount && discountValue !== "") {
    if (discountType === "percent") {
      discountAmt = subtotal * (parseFloat(discountValue)/100);
      discountLabel = discountValue + "% off";
    } else if (discountType === "fixed") {
      discountAmt = Math.min(parseFloat(discountValue)||0, subtotal);
      discountLabel = fmt(discountValue) + " off";
    } else if (discountType === "item" && discountItemIdx !== "") {
      const item = order[parseInt(discountItemIdx)];
      discountAmt = item ? item.price : 0;
      discountLabel = "Free: " + (item ? item.name : "");
    }
  }
  const discountedSub = Math.max(0, subtotal - discountAmt);
  const gstAmt   = discountedSub * gst;
  const pstAmt   = discountedSub * pst;
  const total    = discountedSub + gstAmt + pstAmt;
  const change   = parseFloat(cashGiven||0) - total;

  const tapItem = item => {
    if (item.customGroups && item.customGroups.length > 0) setCustomItem(item);
    else addToOrder(item);
  };
  const addToOrder = item => {
    setOrder(prev => {
      const ex = prev.find(o => o.id===item.id && o.customization===item.customization);
      return ex
        ? prev.map(o => (o.id===item.id && o.customization===item.customization) ? {...o,qty:o.qty+1} : o)
        : [...prev, {...item, qty:1}];
    });
  };
  const removeItem = (id, cust) => setOrder(prev => {
    const ex = prev.find(o => o.id===id && o.customization===cust);
    if (!ex) return prev;
    return ex.qty > 1
      ? prev.map(o => (o.id===id && o.customization===cust) ? {...o,qty:o.qty-1} : o)
      : prev.filter(o => !(o.id===id && o.customization===cust));
  });
  const clearOrder = () => {
    setOrder([]); setNote(""); setCashGiven(""); setReceipt(null); setAccountId("");
    setShowDiscount(false); setDiscountValue(""); setDiscountItemIdx(""); setIsComp(false); setCompAuth(null);
  };

  const completeOrder = () => {
    if (!order.length) return;
    // Complimentary requires auth
    if (isComp && !compAuth) { setPinGate("complimentary"); return; }
    const num = orderNum;
    setOrderNum(n => n + 1);
    const now = Date.now();
    const discount = (discountAmt > 0 || isComp) ? {
      type: isComp ? "complimentary" : discountType,
      label: discountLabel || (isComp ? "Complimentary" : ""),
      amount: parseFloat((discountAmt||0).toFixed(2)),
      authorizedBy: compAuth || ""
    } : null;
    const effectivePayMethod = isComp ? "Complimentary" : payMethod;
    const sale = {
      id: now, orderNumber: num, date: today(), time: nowStr(),
      items: [...order], subtotal, discountAmt: parseFloat((discountAmt||0).toFixed(2)),
      discountedSub: parseFloat((discountedSub||0).toFixed(2)),
      gst: parseFloat((gstAmt||0).toFixed(2)),
      pst: parseFloat((pstAmt||0).toFixed(2)),
      total: parseFloat((total||0).toFixed(2)),
      orderType, payMethod: effectivePayMethod,
      paymentStatus: effectivePayMethod === "On Account" ? "on-account" : "paid",
      accountId: effectivePayMethod === "On Account" ? parseInt(accountId) : null,
      discount, note,
    };
    setKitchenOrders(prev => [...(prev||[]), {...sale, status:"new", placedAt: now}]);
    onSaleComplete(sale);
    setReceipt(sale);
    setOrder([]); setNote(""); setCashGiven(""); setAccountId("");
    setShowDiscount(false); setDiscountValue(""); setDiscountItemIdx(""); setIsComp(false); setCompAuth(null);
  };

  const activeAccounts = accounts.filter(a => a.active);

  if (receipt) {
    const acc = receipt.accountId ? accounts.find(a=>a.id===receipt.accountId) : null;
    return (
      <div style={{maxWidth:440,margin:"0 auto"}}>
        <Card style={{border:"2px solid "+C.green}}>
          <div style={{textAlign:"center",marginBottom:16}}>
            <div style={{fontSize:28}}>&#x2705;</div>
            <div style={{fontWeight:800,fontSize:18,color:C.green}}>Order #{receipt.orderNumber} Placed!</div>
            <div style={{fontSize:12,color:C.charcoal}}>{receipt.date} - {receipt.time} - {receipt.orderType}</div>
            {receipt.paymentStatus==="on-account"&&acc&&<div style={{marginTop:6,background:C.lightGold,borderRadius:6,padding:"4px 10px",fontSize:12}}>On Account: <strong>{acc.name}</strong></div>}
            {receipt.discount&&<div style={{marginTop:6,background:"#E8F5E9",borderRadius:6,padding:"4px 10px",fontSize:12,color:C.green}}>Discount: <strong>{receipt.discount.label}</strong></div>}
          </div>
          <div style={{background:C.lightGold,borderRadius:8,padding:14,marginBottom:14,fontFamily:"monospace",fontSize:13}}>
            <div style={{textAlign:"center",fontWeight:700,marginBottom:4}}>{settings.business.name}</div>
            <div style={{textAlign:"center",fontSize:11,marginBottom:8,color:C.charcoal}}>{settings.business.phone}</div>
            {settings.business.gstNumber&&<div style={{textAlign:"center",fontSize:11,marginBottom:8}}>GST# {settings.business.gstNumber}</div>}
            <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
            {receipt.items.map((i,idx)=>(
              <div key={idx} style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span>{i.qty}x {i.name}{i.customization?" ("+i.customization+")":""}</span>
                <span>{fmt(i.price*i.qty)}</span>
              </div>
            ))}
            <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>Subtotal</span><span>{fmt(receipt.subtotal)}</span></div>
            {receipt.discount&&<div style={{display:"flex",justifyContent:"space-between",color:C.green,fontWeight:700}}><span>{receipt.discount.label}</span><span>-{fmt(receipt.discount.amount)}</span></div>}
            {!receipt.discount&&<div style={{display:"flex",justifyContent:"space-between"}}><span>GST ({settings.taxes.gst}%)</span><span>{fmt(receipt.gst)}</span></div>}
            {!receipt.discount&&<div style={{display:"flex",justifyContent:"space-between"}}><span>PST ({settings.taxes.pst}%)</span><span>{fmt(receipt.pst)}</span></div>}
            <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,fontSize:15}}><span>TOTAL</span><span>{fmt(receipt.total)}</span></div>
            {receipt.payMethod==="On Account"
              ? <div style={{textAlign:"center",marginTop:6,color:C.orange,fontWeight:700}}>BILLED TO ACCOUNT</div>
              : receipt.payMethod==="Cash"&&parseFloat(cashGiven)>0
                ? <><div style={{display:"flex",justifyContent:"space-between"}}><span>Cash</span><span>{fmt(cashGiven)}</span></div><div style={{display:"flex",justifyContent:"space-between",color:C.green,fontWeight:700}}><span>Change</span><span>{fmt(change)}</span></div></>
                : null}
            <hr style={{border:"1px dashed "+C.border,margin:"8px 0"}}/>
            <div style={{textAlign:"center",fontSize:11,color:C.charcoal}}>Real Jamaican Flavour Made with Love</div>
          </div>
          <div style={{background:"#E8F5E9",borderRadius:8,padding:10,marginBottom:12,textAlign:"center",fontSize:13}}>Order sent to kitchen!</div>
          <Btn onClick={clearOrder} style={{width:"100%"}}>New Order</Btn>
        </Card>
      </div>
    );
  }

  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 420px",gap:20,minHeight:"calc(100vh - 180px)"}}>
      {pinGate && (
        <ManagerPINModal staff={staff} positions={positions} permission="authorizeDiscounts"
          action={pinGate==="complimentary"?"mark as complimentary":"apply discount"}
          onSuccess={name=>{
            if (pinGate==="complimentary") { setIsComp(true); setCompAuth(name); }
            else if (pinGate==="discount") { setShowDiscount(true); }
            setPinGate(null);
          }}
          onCancel={()=>{setPinGate(null);}}/>
      )}
      {customItem && (
        <CustomizeModal item={customItem}
          onConfirm={item=>{addToOrder(item);setCustomItem(null);}}
          onCancel={()=>setCustomItem(null)}/>
      )}

      {/* Menu Grid */}
      <div style={{overflow:"auto"}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          {cats.map(c=>(
            <button key={c} onClick={()=>setFilterCat(c)} style={{background:filterCat===c?C.green:"transparent",color:filterCat===c?C.white:C.charcoal,border:"1px solid "+(filterCat===c?C.green:C.border),borderRadius:20,padding:"5px 14px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{c}</button>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
          {visible.map(item=>(
            <button key={item.id+""+(item.customization||"")} onClick={()=>tapItem(item)}
              style={{background:C.white,border:"2px solid "+C.border,borderRadius:10,padding:12,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=C.gold;e.currentTarget.style.background=C.lightGold;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.white;}}>
              <div style={{fontSize:14,fontWeight:700,color:C.dark,marginBottom:4}}>{item.name}</div>
              <div style={{fontSize:17,fontWeight:800,color:C.green,marginBottom:4}}>{fmt(item.price)}</div>
              {item.comesWith&&item.comesWith.length>0&&<div style={{fontSize:10,color:C.teal}}>{item.comesWith.slice(0,2).join(" + ")}{item.comesWith.length>2?"...":""}</div>}
            </button>
          ))}
        </div>
      </div>

      {/* Order Panel */}
      <Card style={{display:"flex",flexDirection:"column",gap:8,overflow:"auto",padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <strong style={{color:C.dark}}>Current Order</strong>
          <Sel value={orderType} onChange={setOrderType} options={["Dine-in","Takeout","Catering","Advance Order"]} style={{fontSize:12,padding:"4px 8px"}}/>
        </div>
        {order.length===0&&<div style={{textAlign:"center",color:C.gray,padding:30,fontSize:13}}>Tap menu items to add</div>}
        {order.map((item,idx)=>(
          <div key={idx} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"7px 0",borderBottom:"1px solid "+C.border}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:C.dark}}>{item.name}</div>
              {item.customization&&<div style={{fontSize:11,color:C.teal}}>{item.customization}</div>}
              <div style={{fontSize:12,color:C.charcoal}}>{fmt(item.price)} ea</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <Btn small onClick={()=>removeItem(item.id,item.customization)} color={C.red} outline style={{padding:"2px 8px"}}>-</Btn>
              <span style={{fontWeight:700,minWidth:20,textAlign:"center"}}>{item.qty}</span>
              <Btn small onClick={()=>addToOrder(item)} color={C.green} outline style={{padding:"2px 8px"}}>+</Btn>
            </div>
            <div style={{fontSize:13,fontWeight:700,minWidth:50,textAlign:"right"}}>{fmt(item.price*item.qty)}</div>
          </div>
        ))}

        {order.length>0&&(
          <>
            <Inp value={note} onChange={setNote} placeholder="Order note (optional)"/>

            {/* Discount section */}
            {!isComp && (
              <div>
                {!showDiscount
                  ? <div style={{display:"flex",gap:6}}>
                      <Btn small onClick={()=>setPinGate("discount")} color={C.purple} outline style={{flex:1}}>Add Discount</Btn>
                      <Btn small onClick={()=>setPinGate("complimentary")} color={C.teal} outline style={{flex:1}}>Complimentary</Btn>
                    </div>
                  : <div style={{background:C.cream,borderRadius:8,padding:10,border:"1px solid "+C.border}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <strong style={{fontSize:12}}>Discount</strong>
                        <Btn small onClick={()=>{setShowDiscount(false);setDiscountValue("");setDiscountItemIdx("");}} color={C.red} outline>Remove</Btn>
                      </div>
                      <div style={{display:"flex",gap:6,marginBottom:8}}>
                        {["percent","fixed","item"].map(t=>(
                          <button key={t} onClick={()=>{setDiscountType(t);setDiscountValue("");setDiscountItemIdx("");}}
                            style={{flex:1,padding:"5px 0",border:"2px solid "+(discountType===t?C.purple:C.border),borderRadius:6,background:discountType===t?C.purple:C.white,color:discountType===t?C.white:C.charcoal,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                            {t==="percent"?"% Off":t==="fixed"?"$ Off":"Free Item"}
                          </button>
                        ))}
                      </div>
                      {discountType==="item"
                        ? <Sel value={discountItemIdx} onChange={setDiscountItemIdx}
                            options={[""].concat(order.map((_,i)=>String(i)))}
                            style={{width:"100%",marginBottom:4}}/>
                        : <Inp type="number" value={discountValue} onChange={setDiscountValue} placeholder={discountType==="percent"?"e.g. 10 (for 10%)":"e.g. 5.00"} style={{marginBottom:4}}/>
                      }
                      {discountType==="item"&&discountItemIdx!==""&&order[parseInt(discountItemIdx)]&&(
                        <div style={{fontSize:12,color:C.purple}}>Free: {order[parseInt(discountItemIdx)].name} (-{fmt(order[parseInt(discountItemIdx)].price)})</div>
                      )}
                      {discountAmt>0&&discountType!=="item"&&<div style={{fontSize:12,color:C.purple,fontWeight:700}}>Saving: -{fmt(discountAmt)}</div>}
                    </div>
                }
              </div>
            )}
            {isComp&&(
              <div style={{background:"#E0F2F1",borderRadius:8,padding:10,border:"1px solid "+C.teal,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><strong style={{fontSize:12,color:C.teal}}>COMPLIMENTARY</strong><div style={{fontSize:11,color:C.charcoal}}>Auth: {compAuth}</div></div>
                <Btn small onClick={()=>{setIsComp(false);setCompAuth(null);}} color={C.red} outline>Remove</Btn>
              </div>
            )}

            {/* Totals */}
            <div style={{background:C.lightGold,borderRadius:8,padding:12,fontSize:13}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>Subtotal</span><span>{fmt(subtotal)}</span></div>
              {discountAmt>0&&<div style={{display:"flex",justifyContent:"space-between",color:isComp?C.teal:C.purple,fontWeight:700,marginBottom:3}}><span>{discountLabel}</span><span>-{fmt(discountAmt)}</span></div>}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>GST ({settings.taxes.gst}%)</span><span>{fmt(gstAmt)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span>PST ({settings.taxes.pst}%)</span><span>{fmt(pstAmt)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:16,color:isComp?C.teal:C.green}}><span>TOTAL</span><span>{fmt(total)}</span></div>
            </div>

            {!isComp&&<Sel value={payMethod} onChange={setPayMethod} options={["Card Machine","Cash","Transfer","On Account"]}/>}
            {isComp&&<div style={{background:C.teal,color:C.white,borderRadius:8,padding:"8px 12px",fontSize:13,fontWeight:700,textAlign:"center"}}>No payment - Complimentary Order</div>}

            {payMethod==="Cash"&&!isComp&&(
              <div>
                <Inp type="number" value={cashGiven} onChange={setCashGiven} placeholder="Cash given by customer"/>
                {parseFloat(cashGiven)>=total&&<div style={{color:C.green,fontWeight:700,fontSize:14,marginTop:4}}>Change: {fmt(change)}</div>}
              </div>
            )}
            {payMethod==="On Account"&&!isComp&&(
              <div>
                {activeAccounts.length===0
                  ? <div style={{background:C.lightRed,borderRadius:8,padding:10,fontSize:12,color:C.red}}>No accounts set up. Add in Accounts tab.</div>
                  : <Sel value={accountId} onChange={setAccountId} options={[""].concat(activeAccounts.map(a=>String(a.id)))} style={{width:"100%"}}/>
                }
                {accountId&&activeAccounts.find(a=>String(a.id)===accountId)&&(
                  <div style={{fontSize:12,color:C.charcoal,marginTop:4}}>Account: <strong>{(activeAccounts.find(a=>String(a.id)===accountId)||{}).name}</strong></div>
                )}
              </div>
            )}
            <Btn onClick={completeOrder} style={{width:"100%",padding:14,fontSize:15,background:isComp?C.teal:C.green}}>
              {isComp?"Complete - Complimentary":"Place Order - "+fmt(total)}
            </Btn>
            <Btn onClick={clearOrder} color={C.red} outline style={{width:"100%"}}>Clear</Btn>
          </>
        )}
      </Card>
    </div>
  );
}

// -- KITCHEN TAB --------------------------------------------------------------
const K_COLORS = { new:C.red, cooking:C.orange, ready:C.green, collected:"#9E9E9E" };
const K_LABELS = { new:"NEW", cooking:"COOKING", ready:"READY", collected:"COLLECTED" };

function KitchenTab({kitchenOrders, setKitchenOrders}) {
  const [filter, setFilter] = useState("active");
  const [lastRefresh, setLastRefresh] = useState(Date.now());

  useEffect(() => {
    const t = setInterval(() => setLastRefresh(Date.now()), 4000);
    return () => clearInterval(t);
  }, []);

  const updateStatus = (id, status) => {
    setKitchenOrders(prev => prev.map(o => o.id===id ? {...o,status} : o));
  };

  const orders = (kitchenOrders || []);
  const visible = filter === "active"
    ? orders.filter(o => o.status !== "collected")
    : orders.filter(o => o.status === "collected");

  const sorted = [...visible].sort((a,b) => a.placedAt - b.placedAt);

  const newCount     = orders.filter(o=>o.status==="new").length;
  const cookingCount = orders.filter(o=>o.status==="cooking").length;
  const readyCount   = orders.filter(o=>o.status==="ready").length;

  return (
    <div>
      <div style={{background:"#1A1208",borderRadius:12,padding:"16px 24px",marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
        <div style={{color:C.gold,fontWeight:800,fontSize:22}}>Kitchen Display</div>
        <div style={{display:"flex",gap:20,fontSize:16}}>
          <span style={{color:C.red,fontWeight:800,fontSize:18}}>{newCount} New</span>
          <span style={{color:C.orange,fontWeight:800,fontSize:18}}>{cookingCount} Cooking</span>
          <span style={{color:C.green,fontWeight:800,fontSize:18}}>{readyCount} Ready</span>
        </div>
        <div style={{fontSize:11,color:"#888"}}>Auto-refreshes every 4s - open this tab on kitchen tablet</div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <Btn onClick={()=>setFilter("active")} color={filter==="active"?C.green:C.charcoal} outline={filter!=="active"}>Active Orders ({orders.filter(o=>o.status!=="collected").length})</Btn>
        <Btn onClick={()=>setFilter("done")} color={filter==="done"?C.charcoal:C.charcoal} outline={filter!=="done"}>Collected ({orders.filter(o=>o.status==="collected").length})</Btn>
      </div>

      {sorted.length === 0 && (
        <Card style={{textAlign:"center",padding:60}}>
          <div style={{fontSize:36,marginBottom:12}}>&#x1F4A4;</div>
          <div style={{fontSize:18,color:C.charcoal,fontWeight:700}}>No {filter==="active"?"active":""} orders</div>
          <div style={{fontSize:13,color:C.gray,marginTop:8}}>Orders placed from POS appear here instantly</div>
        </Card>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:20}}>
        {sorted.map(order => (
          <div key={order.id} style={{borderRadius:12,border:"3px solid "+(K_COLORS[order.status]||C.border),background:C.white,overflow:"hidden"}}>
            {/* Header */}
            <div style={{background:K_COLORS[order.status]||C.charcoal,padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{color:C.white,fontWeight:800,fontSize:32}}>#{order.orderNumber}</div>
              <div style={{textAlign:"right"}}>
                <div style={{color:C.white,fontWeight:800,fontSize:18}}>{K_LABELS[order.status]}</div>
                <div style={{color:"rgba(255,255,255,0.85)",fontSize:13}}>{elapsed(order.placedAt)}</div>
              </div>
            </div>
            {/* Order details */}
            <div style={{padding:18}}>
              <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                <Badge color={order.orderType==="Dine-in"?C.green:C.blue}>{order.orderType}</Badge>
                {order.paymentStatus==="on-account" && <Badge color={C.orange}>On Account</Badge>}
                <span style={{fontSize:12,color:C.charcoal}}>{order.time}</span>
              </div>
              {order.items.map((item,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:14}}>
                  <div>
                    <span style={{fontWeight:800,marginRight:8,fontSize:18}}>{item.qty}x</span>
                    <span style={{fontSize:16}}>{item.name}</span>
                    {item.customization && <div style={{fontSize:12,color:C.teal,paddingLeft:20}}>{item.customization}</div>}
                  </div>
                </div>
              ))}
              {order.note && <div style={{background:C.lightGold,borderRadius:6,padding:"6px 10px",fontSize:12,color:C.dark,marginTop:8}}>Note: {order.note}</div>}
            </div>
            {/* Status buttons */}
            <div style={{padding:"0 16px 16px",display:"flex",gap:10,flexWrap:"wrap"}}>
              {order.status !== "new" && (
                <Btn small onClick={()=>updateStatus(order.id,"new")} color={C.red} outline>New</Btn>
              )}
              {order.status !== "cooking" && (
                <Btn small onClick={()=>updateStatus(order.id,"cooking")} color={C.orange} outline={order.status!=="cooking"}>Cooking</Btn>
              )}
              {order.status !== "ready" && order.status !== "collected" && (
                <Btn small onClick={()=>updateStatus(order.id,"ready")} color={C.green}>Ready!</Btn>
              )}
              {order.status === "ready" && (
                <Btn small onClick={()=>updateStatus(order.id,"collected")} color={C.teal}>Collected</Btn>
              )}
              {order.status === "cooking" && (
                <Btn small onClick={()=>updateStatus(order.id,"ready")} color={C.green}>Ready!</Btn>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// -- INVENTORY TAB ------------------------------------------------------------
function InventoryTab({inventory, setInventory, settings, setSettings, menu, recipes, setRecipes, canSeeRecipes}) {
  const [section,     setSection]     = useState("stock");
  const [search,      setSearch]      = useState("");
  const [addMode,     setAddMode]     = useState(false);
  const [editId,      setEditId]      = useState(null);
  const [form,        setForm]        = useState({name:"",cat:"Proteins",unit:"kg",stock:"",minStock:""});
  const [priceRows,   setPriceRows]   = useState([]);
  const [pendingSup,  setPendingSup]  = useState("__pick__");
  const [pendingSupN, setPendingSupN] = useState("");
  const [pendingPrice,setPendingPrice]= useState("");
  // stock count
  const [physCounts,  setPhysCounts]  = useState({});
  const [countLocked, setCountLocked] = useState(false);
  const [countLog,    setCountLog,    logLoaded] = usePersistedState("tog-count-log", []);
  // recipe editing
  const [editRecipeId, setEditRecipeId] = useState(null);
  const [recipeLines,  setRecipeLines]  = useState([]);

  const CATS = ["Proteins","Dry Goods","Produce","Pantry","Spices","Sides","Beverages","Packaging"];
  const allSuppliers = settings.suppliers || [];
  const lowStock = inventory.filter(i => i.stock <= i.minStock);
  const bestPrice = item => { const e = Object.entries(item.prices||{}); return e.length ? e.reduce((a,b)=>a[1]<b[1]?a:b) : null; };

  // Servings helpers
  const getCanMake = menuItemId => {
    const recipe = recipes[menuItemId] || [];
    if (!recipe.length) return null;
    let min = Infinity, bottleneck = "";
    recipe.forEach(ing => {
      const inv = inventory.find(i => i.id === ing.invId);
      if (!inv || ing.qty <= 0) return;
      const s = Math.floor(inv.stock / ing.qty);
      if (s < min) { min = s; bottleneck = inv.name; }
    });
    return min === Infinity ? null : {can: min, bottleneck};
  };

  const getIngUsage = (invId, stock) => {
    const usage = [];
    (menu||[]).forEach(m => {
      const recipe = recipes[m.id] || [];
      const ing = recipe.find(r => r.invId === invId);
      if (!ing || ing.qty <= 0) return;
      usage.push({name: m.name, servings: Math.floor(stock / ing.qty)});
    });
    return usage.sort((a,b)=>a.servings-b.servings).slice(0,4);
  };

  // Form helpers
  const openAdd = () => { setEditId(null); setForm({name:"",cat:"Proteins",unit:"kg",stock:"",minStock:""}); setPriceRows([]); setPendingSup("__pick__"); setPendingSupN(""); setPendingPrice(""); setAddMode(true); };
  const openEdit = item => {
    setEditId(item.id);
    setForm({name:item.name, cat:item.cat, unit:item.unit||"kg", stock:item.stock, minStock:item.minStock});
    setPriceRows(Object.entries(item.prices||{}).map(([sup,price])=>({sup, price:String(price)})));
    setPendingSup("__pick__"); setPendingSupN(""); setPendingPrice(""); setAddMode(true);
  };
  const addPriceRow = () => {
    const supName = pendingSup === "__new__" ? pendingSupN.trim() : pendingSup;
    if (!supName || supName === "__pick__" || !pendingPrice) return;
    if (pendingSup === "__new__" && supName && !allSuppliers.includes(supName)) {
      setSettings({...settings, suppliers:[...allSuppliers, supName]});
    }
    setPriceRows(prev => [...prev.filter(r=>r.sup!==supName), {sup:supName, price:pendingPrice}]);
    setPendingSup("__pick__"); setPendingSupN(""); setPendingPrice("");
  };
  const saveItem = () => {
    const prices = {};
    priceRows.forEach(r => { if (r.sup && r.price) prices[r.sup] = parseFloat(r.price)||0; });
    const item = {...form, prices, stock:parseFloat(form.stock)||0, minStock:parseFloat(form.minStock)||0};
    if (editId) setInventory(inventory.map(i => i.id===editId ? {...i,...item} : i));
    else setInventory([...inventory, {...item, id:Date.now()}]);
    setAddMode(false); setEditId(null);
  };

  // Stock count helpers
  const startCount = () => { const init={}; inventory.forEach(i=>{init[i.id]="";}); setPhysCounts(init); setCountLocked(false); };
  const applyCount = () => {
    const adj=[];
    const updated = inventory.map(item => {
      const phys = parseFloat(physCounts[item.id]);
      if (!isNaN(phys) && phys !== item.stock) { adj.push({id:item.id,name:item.name,before:item.stock,after:phys,diff:phys-item.stock,unit:item.unit}); return {...item,stock:phys}; }
      return item;
    });
    if (adj.length>0) { setInventory(updated); setCountLog(prev=>[...prev,{id:Date.now(),date:today(),time:nowStr(),adjustments:adj}]); }
    setPhysCounts({}); setCountLocked(true); setTimeout(()=>setCountLocked(false),3000);
  };
  const variances = inventory.filter(i => { const p=parseFloat(physCounts[i.id]); return !isNaN(p) && Math.abs(p-i.stock)>0.01; });

  // Recipe helpers
  const openRecipe = item => { setEditRecipeId(item.id); setRecipeLines([...((recipes[item.id])||[])].map(r=>({...r}))); };
  const saveRecipe = () => { setRecipes({...recipes,[editRecipeId]:recipeLines.filter(r=>r.invId&&r.qty>0)}); setEditRecipeId(null); };
  const addRecipeLine = () => setRecipeLines([...recipeLines,{invId:"",qty:""}]);
  const updateLine = (idx,field,val) => setRecipeLines(recipeLines.map((r,i)=>i===idx?{...r,[field]:field==="qty"?val:parseInt(val)||""}:r));
  const removeLine = idx => setRecipeLines(recipeLines.filter((_,i)=>i!==idx));

  const filtered = inventory.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      {lowStock.length>0&&(<div style={{background:C.lightRed,border:"1px solid "+C.red,borderRadius:10,padding:"10px 16px",marginBottom:16}}>[!] <strong style={{color:C.red}}>Low Stock:</strong> <span style={{color:C.red}}>{lowStock.map(i=>i.name).join(", ")}</span></div>)}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
        <Stat icon="&#x1F4E6;" label="Total Items" val={inventory.length}/>
        <Stat icon="&#x26A0;" label="Low Stock" val={lowStock.length} color={lowStock.length>0?C.red:C.green}/>
        <Stat icon="&#x1F69A;" label="Suppliers" val={allSuppliers.length}/>
        <Stat icon="&#x1F4CB;" label="Recipes Mapped" val={Object.keys(recipes).filter(k=>(recipes[k]||[]).length>0).length}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {[["stock","Stock Levels"],["count","Stock Count"],...(canSeeRecipes?[["recipes","Recipe Mapping"]]:[])].map(([k,l])=>(
          <button key={k} onClick={()=>setSection(k)} style={{background:section===k?C.green:"transparent",color:section===k?C.white:C.charcoal,border:"2px solid "+(section===k?C.green:C.border),borderRadius:8,padding:"8px 18px",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>{l}</button>
        ))}
      </div>

      {/* ---- STOCK LEVELS ---- */}
      {section==="stock"&&(
        <div>
          <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center"}}>
            <Inp value={search} onChange={setSearch} placeholder="Search ingredients..." style={{maxWidth:240}}/>
            <Btn onClick={openAdd} style={{marginLeft:"auto"}}>+ Add Item</Btn>
          </div>

          {/* Add/Edit modal */}
          {addMode&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.65)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Card style={{width:540,maxHeight:"88vh",overflow:"auto",border:"2px solid "+C.gold}}>
                <SH>{editId?"Edit Inventory Item":"New Inventory Item"}</SH>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                  <div><label style={{fontSize:12,display:"block",marginBottom:4}}>Item Name *</label><Inp value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="e.g. Whole Chicken"/></div>
                  <div><label style={{fontSize:12,display:"block",marginBottom:4}}>Category</label>
                    <select value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})} style={{width:"100%",border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",fontSize:13,background:C.cream}}>
                      {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div><label style={{fontSize:12,display:"block",marginBottom:4}}>Unit of Measure</label>
                    <select value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})} style={{width:"100%",border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",fontSize:13,background:C.cream}}>
                      {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                    </select>
                  </div>
                  <div><label style={{fontSize:12,display:"block",marginBottom:4}}>Current Stock</label><Inp type="number" value={form.stock} onChange={v=>setForm({...form,stock:v})} placeholder="0"/></div>
                  <div><label style={{fontSize:12,display:"block",marginBottom:4}}>Min Stock (alert level)</label><Inp type="number" value={form.minStock} onChange={v=>setForm({...form,minStock:v})} placeholder="0"/></div>
                </div>

                <SH>Supplier Prices</SH>
                {priceRows.length>0&&(
                  <div style={{marginBottom:10}}>
                    {priceRows.map((r,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,background:C.cream,borderRadius:6,padding:"6px 10px"}}>
                        <span style={{flex:1,fontSize:13,fontWeight:600}}>{r.sup}</span>
                        <span style={{fontSize:13,color:C.green,fontWeight:700}}>{fmt(r.price)}</span>
                        <Btn small onClick={()=>setPriceRows(priceRows.filter((_,j)=>j!==i))} color={C.red} outline>X</Btn>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:8,alignItems:"flex-end",marginBottom:14}}>
                  <div style={{flex:2}}>
                    <label style={{fontSize:11,color:C.charcoal,display:"block",marginBottom:4}}>Supplier</label>
                    {pendingSup==="__new__"
                      ? <Inp value={pendingSupN} onChange={setPendingSupN} placeholder="New supplier name"/>
                      : <select value={pendingSup} onChange={e=>setPendingSup(e.target.value)} style={{width:"100%",border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",fontSize:13,background:C.cream}}>
                          <option value="__pick__">-- Select supplier --</option>
                          {allSuppliers.map(s=><option key={s} value={s}>{s}</option>)}
                          <option value="__new__">+ Add new supplier...</option>
                        </select>
                    }
                  </div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,color:C.charcoal,display:"block",marginBottom:4}}>Price per {form.unit||"unit"}</label>
                    <Inp type="number" value={pendingPrice} onChange={setPendingPrice} placeholder="0.00"/>
                  </div>
                  <Btn small onClick={addPriceRow} color={C.blue}>Add</Btn>
                  {pendingSup==="__new__"&&<Btn small onClick={()=>{setPendingSup("__pick__");setPendingSupN("");}} color={C.charcoal} outline>Cancel</Btn>}
                </div>

                <div style={{display:"flex",gap:8}}><Btn onClick={saveItem}>{editId?"Save Changes":"Add Item"}</Btn><Btn onClick={()=>{setAddMode(false);setEditId(null);}} color={C.charcoal} outline>Cancel</Btn></div>
              </Card>
            </div>
          )}

          <Card style={{padding:0,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:C.green}}>{["Item","Cat","Stock","Servings Available",""].map(h=><th key={h} style={{color:C.white,padding:"10px 12px",textAlign:"left",fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>
                {filtered.map((item,idx)=>{
                  const isLow = item.stock<=item.minStock;
                  const usage = getIngUsage(item.id, item.stock);
                  return (
                    <tr key={item.id} style={{background:idx%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                      <td style={{padding:"9px 12px",fontWeight:600}}>{item.name}</td>
                      <td style={{padding:"9px 12px"}}><Badge small>{item.cat}</Badge></td>
                      <td style={{padding:"9px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:4}}>
                          <Btn small onClick={()=>setInventory(inventory.map(i=>i.id===item.id?{...i,stock:Math.max(0,parseFloat((i.stock-1).toFixed(3)))}:i))} color={C.red} outline style={{padding:"2px 7px"}}>-</Btn>
                          <span style={{fontWeight:700,color:isLow?C.red:C.green,minWidth:55,textAlign:"center"}}>{item.stock} {item.unit}</span>
                          <Btn small onClick={()=>setInventory(inventory.map(i=>i.id===item.id?{...i,stock:parseFloat((i.stock+1).toFixed(3))}:i))} color={C.green} outline style={{padding:"2px 7px"}}>+</Btn>
                          {isLow&&<span style={{color:C.red,fontSize:10}}>[low]</span>}
                        </div>
                      </td>

                      <td style={{padding:"9px 12px",fontSize:11}}>
                        {usage.length===0
                          ? <span style={{color:C.gray}}>Not in any recipe</span>
                          : usage.map((u,i)=>(
                              <div key={i} style={{color:u.servings<5?C.red:u.servings<15?C.orange:C.green}}>
                                {u.servings}x {u.name.length>18?u.name.slice(0,18)+"...":u.name}
                              </div>
                            ))
                        }
                      </td>
                      <td style={{padding:"9px 12px"}}><div style={{display:"flex",gap:4}}><Btn small onClick={()=>openEdit(item)} color={C.gold}>Edit</Btn><Btn small onClick={()=>setInventory(inventory.filter(i=>i.id!==item.id))} color={C.red} outline>Del</Btn></div></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}

      {/* ---- STOCK COUNT ---- */}
      {section==="count"&&(
        <div>
          <div style={{background:"#E3F2FD",border:"1px solid #1976D2",borderRadius:10,padding:"12px 16px",marginBottom:16}}>
            <strong>Stock Count:</strong> Fill in the physical quantity you count for each item. System shows variance instantly. Click "Apply" to update stock levels and log the count.
          </div>
          {countLocked&&<div style={{background:"#E8F5E9",border:"1px solid "+C.green,borderRadius:8,padding:12,marginBottom:14,fontWeight:700,color:C.green,textAlign:"center"}}>Count applied and logged!</div>}
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
            <div style={{fontSize:13,color:C.charcoal}}>{Object.keys(physCounts).length>0?Object.values(physCounts).filter(v=>v!=="").length+" of "+inventory.length+" items counted | "+variances.length+" variance(s)":"Click Start Count to begin"}</div>
            <div style={{marginLeft:"auto",display:"flex",gap:8}}>
              {Object.keys(physCounts).length===0
                ? <Btn onClick={startCount} color={C.blue}>Start Stock Count</Btn>
                : <><Btn onClick={()=>setPhysCounts({})} color={C.charcoal} outline>Cancel</Btn><Btn onClick={applyCount} color={variances.length>0?C.orange:C.green}>Apply ({variances.length} changes)</Btn></>
              }
            </div>
          </div>
          <Card style={{padding:0,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:C.green}}>{["Item","Category","System Qty","Physical Count","Variance","Status"].map(h=><th key={h} style={{color:C.white,padding:"10px 12px",textAlign:"left",fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>
                {inventory.map((item,idx)=>{
                  const phys=physCounts[item.id];const physNum=parseFloat(phys);
                  const hasCount=phys!==undefined&&phys!=="";const variance=hasCount&&!isNaN(physNum)?physNum-item.stock:null;
                  const varColor=variance===null?C.gray:Math.abs(variance)<0.01?C.green:variance>0?C.blue:C.red;
                  const isActive=Object.keys(physCounts).length>0;
                  return (<tr key={item.id} style={{background:idx%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                    <td style={{padding:"9px 12px",fontWeight:600}}>{item.name}</td>
                    <td style={{padding:"9px 12px"}}><Badge small>{item.cat}</Badge></td>
                    <td style={{padding:"9px 12px",fontWeight:700,color:item.stock<=item.minStock?C.red:C.charcoal}}>{item.stock} {item.unit}</td>
                    <td style={{padding:"9px 12px"}}>
                      {isActive
                        ? <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <input type="number" value={physCounts[item.id]||""} onChange={e=>setPhysCounts({...physCounts,[item.id]:e.target.value})} placeholder={"e.g. "+item.stock} step="0.1"
                              style={{border:"2px solid "+(hasCount?varColor:C.border),borderRadius:6,padding:"6px 10px",fontSize:13,width:90,outline:"none",background:C.white,fontWeight:700}}/>
                            <span style={{fontSize:11,color:C.gray}}>{item.unit}</span>
                          </div>
                        : <span style={{fontSize:12,color:C.gray}}>Start count first</span>}
                    </td>
                    <td style={{padding:"9px 12px",fontWeight:700,color:varColor}}>{variance!==null?(variance>0?"+":"")+variance.toFixed(2)+" "+item.unit:"--"}</td>
                    <td style={{padding:"9px 12px"}}>{variance===null?<span style={{fontSize:12,color:C.gray}}>--</span>:Math.abs(variance)<0.01?<Badge color={C.green} small>Match</Badge>:variance>0?<Badge color={C.blue} small>Over</Badge>:<Badge color={C.red} small>Short</Badge>}</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </Card>
          {countLog.length>0&&(<Card style={{marginTop:20}}><SH>Count History</SH>{[...countLog].reverse().slice(0,5).map(entry=>(<div key={entry.id} style={{borderBottom:"1px solid "+C.border,paddingBottom:10,marginBottom:10}}><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{entry.date} at {entry.time} - {entry.adjustments.length} adjustment(s)</div>{entry.adjustments.map((a,i)=>(<div key={i} style={{display:"flex",gap:16,fontSize:12,color:C.charcoal,paddingLeft:12}}><span style={{fontWeight:600,minWidth:160}}>{a.name}</span><span>{a.before} {a.unit}</span><span style={{color:C.teal}}>counted: {a.after}</span><span style={{color:a.diff>0?C.blue:C.red,fontWeight:700}}>{a.diff>0?"+":""}{a.diff.toFixed(2)} {a.unit}</span></div>))}</div>))}</Card>)}
        </div>
      )}

      {/* ---- RECIPE MAPPING ---- */}
      {section==="recipes"&&canSeeRecipes&&(
        <div>
          {editRecipeId&&(
            <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.65)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Card style={{width:520,maxHeight:"80vh",overflow:"auto",border:"2px solid "+C.gold}}>
                <SH>Recipe: {(menu.find(m=>m.id===editRecipeId)||{}).name}</SH>
                <div style={{background:C.lightGold,borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:C.charcoal}}>Set the quantity of each ingredient used per 1 serving. Deducted from stock automatically on sale.</div>
                {recipeLines.map((line,idx)=>(
                  <div key={idx} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                    <select value={line.invId} onChange={e=>updateLine(idx,"invId",e.target.value)} style={{flex:2,border:"1px solid "+C.border,borderRadius:6,padding:"7px 10px",fontSize:13,background:C.cream}}>
                      <option value="">-- Select ingredient --</option>
                      {inventory.map(i=><option key={i.id} value={i.id}>{i.name} ({i.unit})</option>)}
                    </select>
                    <input type="number" value={line.qty} onChange={e=>updateLine(idx,"qty",e.target.value)} placeholder="Qty" step="0.01" style={{width:80,border:"1px solid "+C.border,borderRadius:6,padding:"7px 10px",fontSize:13,background:C.cream}}/>
                    <span style={{fontSize:12,color:C.gray,minWidth:30}}>{line.invId?((inventory.find(i=>i.id===parseInt(line.invId))||{}).unit||""):"" }</span>
                    <Btn small onClick={()=>removeLine(idx)} color={C.red} outline>X</Btn>
                  </div>
                ))}
                <div style={{display:"flex",gap:8,marginTop:10}}>
                  <Btn onClick={addRecipeLine} color={C.blue} outline small>+ Add Ingredient</Btn>
                  <div style={{marginLeft:"auto",display:"flex",gap:8}}><Btn onClick={saveRecipe}>Save Recipe</Btn><Btn onClick={()=>setEditRecipeId(null)} color={C.charcoal} outline>Cancel</Btn></div>
                </div>
              </Card>
            </div>
          )}
          <div style={{background:C.lightGold,borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:13}}>
            <strong>Recipe Mapping</strong> - Link menu items to ingredients. The "Can Make" column shows how many servings you can make right now based on current stock levels.
          </div>
          <Card style={{padding:0,overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:C.green}}>{["Menu Item","Category","Ingredients","Can Make Now",""].map(h=><th key={h} style={{color:C.white,padding:"10px 12px",textAlign:"left",fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>
                {(menu||[]).map((item,idx)=>{
                  const recipe=recipes[item.id]||[];
                  const cm=recipe.length>0?getCanMake(item.id):null;
                  return(
                    <tr key={item.id} style={{background:idx%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                      <td style={{padding:"9px 12px",fontWeight:600}}>{item.name}{!item.available&&<span style={{fontSize:10,color:C.gray,marginLeft:6}}>(hidden)</span>}</td>
                      <td style={{padding:"9px 12px"}}><Badge small>{item.cat}</Badge></td>
                      <td style={{padding:"9px 12px"}}>
                        {recipe.length===0?<span style={{fontSize:12,color:C.gray}}>No recipe set</span>
                          :<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                            {recipe.map((r,i)=>{const inv=inventory.find(x=>x.id===r.invId);return inv?<Badge key={i} small color={C.teal}>{r.qty}{inv.unit} {inv.name}</Badge>:null;})}
                          </div>
                        }
                      </td>
                      <td style={{padding:"9px 12px"}}>
                        {cm===null
                          ? <span style={{fontSize:12,color:C.gray}}>--</span>
                          : <div>
                              <span style={{fontWeight:800,fontSize:15,color:cm.can<5?C.red:cm.can<15?C.orange:C.green}}>{cm.can}</span>
                              <span style={{fontSize:11,color:C.charcoal}}> servings</span>
                              {cm.can<20&&<div style={{fontSize:11,color:C.red}}>Low: {cm.bottleneck}</div>}
                            </div>
                        }
                      </td>
                      <td style={{padding:"9px 12px"}}><Btn small onClick={()=>openRecipe(item)} color={recipe.length>0?C.gold:C.blue}>{recipe.length>0?"Edit":"Set Recipe"}</Btn></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </Card>
        </div>
      )}
    </div>
  );
}

// -- EXPENSES TAB -------------------------------------------------------------
function ExpensesTab({expenses, setExpenses, settings}) {
  const CATS = settings.expenseCategories || ["Lease","Insurance","Food & Inventory","Supplies","Marketing","Utilities","Staff Wages","Licensing","Other"];
  const CAT_PALETTE = [C.green,C.gold,C.darkGold,C.lightGreen,C.purple,C.blue,C.orange,"#AD1457",C.charcoal,C.teal,C.red,"#795548","#607D8B"];
  const catColor = cat => {
    const idx = CATS.indexOf(cat);
    return idx >= 0 ? CAT_PALETTE[idx % CAT_PALETTE.length] : C.charcoal;
  };
  const [form, setForm] = useState({date:today(),cat:CATS[0]||"Other",desc:"",amount:"",supplier:""});
  const [addMode, setAddMode] = useState(false);
  const [filterMonth, setFilterMonth] = useState(today().slice(0,7));
  const filtered = expenses.filter(e => e.date.startsWith(filterMonth));
  const total = filtered.reduce((s,e) => s + e.amount, 0);
  const CAT_COLORS = {}; CATS.forEach(cat => { CAT_COLORS[cat] = catColor(cat); });
  const byCat = CATS.map(c => ({c, t:filtered.filter(e=>e.cat===c).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.t>0);
  const add = () => {
    if (!form.desc || !form.amount) return;
    setExpenses([...expenses,{...form,id:Date.now(),amount:parseFloat(form.amount)}]);
    setForm({date:today(),cat:"Food & Inventory",desc:"",amount:"",supplier:""});
    setAddMode(false);
  };
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
        <Card style={{background:C.lightGold}}>
          <div style={{fontSize:12,color:C.charcoal,marginBottom:4}}>Total Expenses This Month</div>
          <div style={{fontSize:30,fontWeight:800,color:C.red}}>{fmt(total)}</div>
          <div style={{fontSize:12,color:C.charcoal}}>{filtered.length} transactions</div>
        </Card>
        <Card>
          <div style={{fontSize:12,color:C.charcoal,marginBottom:8}}>By Category</div>
          {byCat.length===0&&<div style={{fontSize:12,color:C.gray}}>No expenses this month.</div>}
          {byCat.map(({c,t})=>(<div key={c} style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:13}}><span style={{color:CAT_COLORS[c]||C.charcoal}}>* {c}</span><strong>{fmt(t)}</strong></div>))}
        </Card>
      </div>
      <div style={{background:"#E8F5E9",border:"1px solid "+C.lightGreen,borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13}}>
        BC Tax Note: GST 5% + PST 7% on most purchases. Est. GST on expenses: <strong>{fmt(total*0.05)}</strong>. Keep all receipts for Input Tax Credits.
      </div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
        <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={{border:"1px solid "+C.border,borderRadius:8,padding:"8px 12px",fontSize:13,background:C.cream}}/>
        <Btn onClick={()=>setAddMode(!addMode)} style={{marginLeft:"auto"}}>+ Add Expense</Btn>
      </div>
      {addMode && (
        <Card style={{marginBottom:14,background:C.lightGold,border:"2px solid "+C.gold}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
            <Inp type="date" value={form.date} onChange={v=>setForm({...form,date:v})} placeholder="Date"/>
            <Sel value={form.cat} onChange={v=>setForm({...form,cat:v})} options={CATS}/>
            <Inp value={form.desc} onChange={v=>setForm({...form,desc:v})} placeholder="Description"/>
            <Inp type="number" value={form.amount} onChange={v=>setForm({...form,amount:v})} placeholder="Amount (CAD)"/>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <Inp value={form.supplier} onChange={v=>setForm({...form,supplier:v})} placeholder="Supplier (optional)" style={{maxWidth:220}}/>
            <Btn onClick={add}>Add</Btn><Btn onClick={()=>setAddMode(false)} color={C.charcoal} outline>Cancel</Btn>
          </div>
        </Card>
      )}
      <Card style={{padding:0,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead><tr style={{background:C.green}}>{["Date","Category","Description","Supplier","Amount",""].map(h=><th key={h} style={{color:C.white,padding:"10px 14px",textAlign:"left",fontSize:12}}>{h}</th>)}</tr></thead>
          <tbody>
            {filtered.sort((a,b)=>b.date.localeCompare(a.date)).map((e,idx)=>(
              <tr key={e.id} style={{background:idx%2===0?C.white:C.cream,borderBottom:"1px solid "+C.border}}>
                <td style={{padding:"9px 14px",color:C.charcoal}}>{e.date}</td>
                <td style={{padding:"9px 14px"}}><Badge color={CAT_COLORS[e.cat]||C.charcoal}>{e.cat}</Badge></td>
                <td style={{padding:"9px 14px"}}>{e.desc}</td>
                <td style={{padding:"9px 14px",fontSize:12,color:C.charcoal}}>{e.supplier||"--"}</td>
                <td style={{padding:"9px 14px",fontWeight:700,color:C.red}}>{fmt(e.amount)}</td>
                <td style={{padding:"9px 14px"}}><Btn small onClick={()=>setExpenses(expenses.filter(x=>x.id!==e.id))} color={C.red} outline>Del</Btn></td>
              </tr>
            ))}
          </tbody>
          <tfoot><tr style={{background:C.lightGold}}>
            <td colSpan={4} style={{padding:"10px 14px",fontWeight:700}}>TOTAL</td>
            <td style={{padding:"10px 14px",fontWeight:800,color:C.red,fontSize:15}}>{fmt(total)}</td>
            <td/>
          </tr></tfoot>
        </table>
      </Card>
    </div>
  );
}

// -- STAFF TAB ----------------------------------------------------------------
function StaffTab({staff, setStaff, positions}) {
  const [loaded]    = [true]; // staff is passed from App (already loaded)
  const [addMode,   setAddMode]  = useState(false);
  const [editId,    setEditId]   = useState(null);
  const [showPin,   setShowPin]  = useState(false);
  const [pinModal,  setPinModal] = useState(null);
  const [pinInput,  setPinInput] = useState("");
  const [pinError,  setPinError] = useState("");
  const [payPeriod, setPayPeriod]= useState("bi-weekly");
  const blankForm = {name:"",role:"",type:"Hired",pin:"",hourlyRate:"",hoursPerWeek:"",startDate:today(),positionId:3};
  const [form, setForm] = useState(blankForm);

  const mult = payPeriod==="weekly"?1:payPeriod==="bi-weekly"?2:4;
  const payrollTotal = staff.filter(s=>s.type!=="Owner").reduce((sum,s)=>sum+s.hourlyRate*s.hoursPerWeek*mult,0);

  const getPos = s => (positions||POSITIONS_INIT).find(p=>p.id===s.positionId) || {name:"No Position",color:C.gray,permissions:{}};

  const openAdd  = () => { setEditId(null); setForm(blankForm); setShowPin(false); setAddMode(true); };
  const openEdit = s  => { setEditId(s.id); setForm({name:s.name,role:s.role,type:s.type,pin:s.pin,hourlyRate:s.hourlyRate,hoursPerWeek:s.hoursPerWeek,startDate:s.startDate||"",positionId:s.positionId||3}); setShowPin(false); setAddMode(true); };
  const saveForm = () => {
    if (!form.name||!form.role) return;
    const base = {hourlyRate:parseFloat(form.hourlyRate)||0,hoursPerWeek:parseFloat(form.hoursPerWeek)||0};
    if (editId) {
      setStaff(staff.map(s=>s.id===editId?{...s,...form,...base}:s));
    } else {
      setStaff([...staff,{...form,...base,id:Date.now(),clockedIn:false,clockHistory:[]}]);
    }
    setAddMode(false); setEditId(null); setForm(blankForm);
  };

  const attemptClock = id => { setPinModal(id); setPinInput(""); setPinError(""); };
  const confirmPin = () => {
    const s = staff.find(x=>x.id===pinModal);
    if (s.pin && pinInput !== s.pin) { setPinError("Wrong PIN - try again"); return; }
    setStaff(staff.map(x => {
      if (x.id !== pinModal) return x;
      const clockedIn = !x.clockedIn;
      let history = [...(x.clockHistory||[])];
      if (clockedIn) history = [...history,{date:today(),clockIn:nowStr(),clockOut:null}];
      else {
        let li = -1;
        history.forEach((h,i) => { if (h.clockOut===null) li=i; });
        if (li>=0) history[li]={...history[li],clockOut:nowStr()};
      }
      return {...x,clockedIn,clockHistory:history};
    }));
    setPinModal(null); setPinInput("");
  };

  return (
    <div>
      {/* Clock-in PIN modal */}
      {pinModal && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.65)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Card style={{width:300,textAlign:"center",border:"2px solid "+C.gold}}>
            <div style={{fontSize:20,marginBottom:8}}>Clock In / Out</div>
            <div style={{marginBottom:8,color:C.charcoal,fontSize:13,fontWeight:700}}>{(staff.find(s=>s.id===pinModal)||{}).name}</div>
            <Inp type="password" value={pinInput} onChange={v=>{setPinInput(v);setPinError("");}} placeholder="PIN"
              style={{textAlign:"center",letterSpacing:8,fontSize:20,marginBottom:8}}/>
            {pinError&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>{pinError}</div>}
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              <Btn onClick={confirmPin}>Confirm</Btn>
              <Btn onClick={()=>setPinModal(null)} color={C.charcoal} outline>Cancel</Btn>
            </div>
          </Card>
        </div>
      )}

      {/* Add / Edit modal */}
      {addMode && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.65)",zIndex:998,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Card style={{width:480,border:"2px solid "+C.gold,maxHeight:"90vh",overflow:"auto"}}>
            <SH>{editId?"Edit Staff Member":"New Staff Member"}</SH>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Full Name *</label>
                <Inp value={form.name} onChange={v=>setForm({...form,name:v})} placeholder="Full name"/>
              </div>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Job Title / Role *</label>
                <Inp value={form.role} onChange={v=>setForm({...form,role:v})} placeholder="e.g. Sous Chef"/>
              </div>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Employment Type</label>
                <Sel value={form.type} onChange={v=>setForm({...form,type:v})} options={["Owner","Family","Hired"]}/>
              </div>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Position (sets permissions)</label>
                <Sel value={String(form.positionId)} onChange={v=>setForm({...form,positionId:parseInt(v)})}
                  options={(positions||POSITIONS_INIT).map(p=>String(p.id))}
                  style={{width:"100%"}}/>
                <div style={{fontSize:11,color:C.gray,marginTop:2}}>
                  {(()=>{const pos=(positions||POSITIONS_INIT).find(p=>p.id===parseInt(form.positionId));return pos?pos.name:"";})()}
                </div>
              </div>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Hourly Rate ($)</label>
                <Inp type="number" value={form.hourlyRate} onChange={v=>setForm({...form,hourlyRate:v})} placeholder="0.00"/>
              </div>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Hours / Week</label>
                <Inp type="number" value={form.hoursPerWeek} onChange={v=>setForm({...form,hoursPerWeek:v})} placeholder="0"/>
              </div>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>Start Date</label>
                <Inp type="date" value={form.startDate} onChange={v=>setForm({...form,startDate:v})}/>
              </div>
              <div>
                <label style={{fontSize:12,color:C.charcoal,display:"block",marginBottom:4}}>PIN (4 digits)</label>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <Inp type={showPin?"text":"password"} value={form.pin} onChange={v=>setForm({...form,pin:v})} placeholder="e.g. 1234" style={{flex:1}}/>
                  <button onClick={()=>setShowPin(!showPin)} style={{background:C.cream,border:"1px solid "+C.border,borderRadius:6,padding:"8px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"}}>
                    {showPin?"Hide":"Show"}
                  </button>
                </div>
                {form.pin&&showPin&&<div style={{fontSize:12,color:C.gold,marginTop:3,fontWeight:700}}>PIN: {form.pin}</div>}
              </div>
            </div>
            {/* Permissions preview */}
            {(()=>{
              const pos=(positions||POSITIONS_INIT).find(p=>p.id===parseInt(form.positionId));
              if(!pos) return null;
              const granted=PERMISSIONS.filter(p=>pos.permissions&&pos.permissions[p.key]);
              return (
                <div style={{background:C.cream,borderRadius:8,padding:10,marginBottom:12,fontSize:12}}>
                  <strong style={{color:C.charcoal}}>Permissions for {pos.name}:</strong>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
                    {granted.length===0
                      ? <span style={{color:C.gray}}>No special permissions</span>
                      : granted.map(p=><Badge key={p.key} small color={pos.color||C.green}>{p.label}</Badge>)
                    }
                  </div>
                  <div style={{fontSize:11,color:C.gray,marginTop:6}}>Edit position permissions in Settings.</div>
                </div>
              );
            })()}
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={saveForm} style={{flex:1}}>{editId?"Save Changes":"Add Staff Member"}</Btn>
              <Btn onClick={()=>{setAddMode(false);setEditId(null);}} color={C.charcoal} outline>Cancel</Btn>
            </div>
          </Card>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
        <Stat icon="&#x1F465;" label="Total Staff" val={staff.length}/>
        <Stat icon="&#x1F7E2;" label="Clocked In" val={staff.filter(s=>s.clockedIn).length} color={C.green}/>
        <Stat icon="&#x1F4C5;" label="Pay Period" val={payPeriod} color={C.blue}/>
        <Stat icon="&#x1F4B0;" label="Payroll Est." val={fmt(payrollTotal)} color={C.red}/>
      </div>
      <div style={{background:"#E3F2FD",border:"1px solid #1976D2",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13}}>
        BC Min Wage: <strong>$17.40/hr</strong>. Remit CPP + EI + income tax to CRA by the 15th of following month. Configure positions and permissions in Settings.
      </div>
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
        <label style={{fontSize:13}}>Pay period:</label>
        <Sel value={payPeriod} onChange={setPayPeriod} options={["weekly","bi-weekly","monthly"]}/>
        <Btn onClick={openAdd} style={{marginLeft:"auto"}}>+ Add Staff Member</Btn>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        {staff.map(s => {
          const pos = getPos(s);
          const recent = (s.clockHistory||[]).slice(-2).reverse();
          const periodPay = s.hourlyRate * s.hoursPerWeek * mult;
          const grantedPerms = PERMISSIONS.filter(p=>pos.permissions&&pos.permissions[p.key]);
          return (
            <Card key={s.id} style={{borderLeft:"4px solid "+(pos.color||C.charcoal)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{s.name}</div>
                  <div style={{fontSize:12,color:C.charcoal}}>{s.role}</div>
                </div>
                <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                  <Badge color={pos.color||C.charcoal}>{pos.name}</Badge>
                  {s.clockedIn&&<Badge color={C.green}>In</Badge>}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:13,marginBottom:8}}>
                <div><span style={{color:C.charcoal}}>Rate: </span><strong>{s.hourlyRate>0?fmt(s.hourlyRate)+"/hr":"N/A"}</strong></div>
                <div><span style={{color:C.charcoal}}>{payPeriod}: </span><strong style={{color:C.red}}>{s.hourlyRate>0?fmt(periodPay):"--"}</strong></div>
              </div>
              {grantedPerms.length>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                  {grantedPerms.map(p=><Badge key={p.key} small color={pos.color||C.green}>{p.label}</Badge>)}
                </div>
              )}
              {recent.length>0&&(
                <div style={{background:C.cream,borderRadius:6,padding:"6px 8px",marginBottom:8,fontSize:11}}>
                  {recent.map((r,i)=><div key={i} style={{color:C.charcoal}}>{r.date} In:{r.clockIn}{r.clockOut?" Out:"+r.clockOut:" (active)"}</div>)}
                </div>
              )}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <Btn small onClick={()=>attemptClock(s.id)} color={s.clockedIn?C.red:C.green}>{s.clockedIn?"Clock Out":"Clock In"}</Btn>
                <Btn small onClick={()=>openEdit(s)} color={C.gold}>Edit</Btn>
                <Btn small onClick={()=>setStaff(staff.filter(x=>x.id!==s.id))} color={C.red} outline>Remove</Btn>
              </div>
            </Card>
          );
        })}
      </div>

      <Card style={{background:C.lightGold}}>
        <SH>Payroll Summary ({payPeriod})</SH>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:C.green}}>{["Name","Position","Rate","Hrs/Wk","Gross","CPP 5.95%","EI 1.66%","Net Est."].map(h=><th key={h} style={{color:C.white,padding:"8px 12px",textAlign:"left"}}>{h}</th>)}</tr></thead>
          <tbody>
            {staff.filter(s=>s.type!=="Owner").map((s,i)=>{
              const gross=s.hourlyRate*s.hoursPerWeek*mult;
              const pos=getPos(s);
              return (
                <tr key={s.id} style={{background:i%2===0?C.white:C.cream}}>
                  <td style={{padding:"7px 12px",fontWeight:600}}>{s.name}</td>
                  <td style={{padding:"7px 12px"}}><Badge small color={pos.color||C.charcoal}>{pos.name}</Badge></td>
                  <td style={{padding:"7px 12px"}}>{fmt(s.hourlyRate)}</td>
                  <td style={{padding:"7px 12px"}}>{s.hoursPerWeek}</td>
                  <td style={{padding:"7px 12px",fontWeight:700,color:C.red}}>{fmt(gross)}</td>
                  <td style={{padding:"7px 12px",color:C.charcoal}}>{fmt(gross*0.0595)}</td>
                  <td style={{padding:"7px 12px",color:C.charcoal}}>{fmt(gross*0.0166)}</td>
                  <td style={{padding:"7px 12px",fontWeight:700,color:C.green}}>{fmt(gross*0.9239)}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot><tr style={{background:C.border}}>
            <td colSpan={4} style={{padding:"9px 12px",fontWeight:700}}>TOTAL PAYROLL</td>
            <td style={{padding:"9px 12px",fontWeight:800,color:C.red}}>{fmt(payrollTotal)}</td>
            <td style={{padding:"9px 12px",fontWeight:700}}>{fmt(payrollTotal*0.0595)}</td>
            <td style={{padding:"9px 12px",fontWeight:700}}>{fmt(payrollTotal*0.0166)}</td>
            <td style={{padding:"9px 12px",fontWeight:800,color:C.green}}>{fmt(payrollTotal*0.9239)}</td>
          </tr></tfoot>
        </table>
        <div style={{fontSize:11,color:C.charcoal,marginTop:8}}>* Estimates only. Consult a CRA payroll calculator or accountant.</div>
      </Card>
    </div>
  );
}

// -- ACCOUNTS TAB -------------------------------------------------------------
function AccountsTab({accounts, setAccounts, sales}) {
  const [selected,    setSelected]    = useState(null);
  const [addMode,     setAddMode]     = useState(false);
  const [view,        setView]        = useState("orders");
  const [invoiceRange,setInvoiceRange]= useState({ from: today().slice(0,7)+"-01", to: today() });
  const [form,        setForm]        = useState({name:"",contact:"",phone:"",email:"",billingCycle:"weekly",notes:""});
  const [pmtAmount,   setPmtAmount]   = useState("");
  const [pmtMethod,   setPmtMethod]   = useState("Transfer");
  const [pmtNote,     setPmtNote]     = useState("");
  const [pmtSaved,    setPmtSaved]    = useState(false);

  const onAccountOrders = acc => sales.filter(s => s.accountId === acc.id && s.paymentStatus === "on-account");
  const pendingOrders   = acc => onAccountOrders(acc).filter(s => !s.invoiced);
  const totalOwed       = acc => pendingOrders(acc).reduce((s,o) => s + o.total, 0);

  const recordPayment = () => {
    if (!acc || !pmtAmount) return;
    const pmt = {id:Date.now(), date:today(), time:nowStr(), amount:parseFloat(pmtAmount)||0, method:pmtMethod, note:pmtNote};
    setAccounts(accounts.map(a => a.id===selected ? {...a, payments:[...(a.payments||[]),pmt]} : a));
    setPmtAmount(""); setPmtNote(""); setPmtSaved(true);
    setTimeout(()=>setPmtSaved(false),3000);
  };

  const addAccount = () => {
    if (!form.name) return;
    setAccounts([...accounts,{...form,id:Date.now(),balance:0,active:true,createdAt:today()}]);
    setForm({name:"",contact:"",phone:"",email:"",billingCycle:"weekly",notes:""});
    setAddMode(false);
  };

  const acc = selected ? accounts.find(a => a.id === selected) : null;
  const accOrders    = acc ? onAccountOrders(acc) : [];
