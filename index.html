  document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;font-family:Georgia,serif"><div style="font-size:40px">&#x1F37D;</div><h2 style="margin:16px 0 8px">Loading Error</h2><p style="color:#666;font-size:14px">' + e.message + '</p><button onclick="location.reload()" style="margin-top:16px;background:#1B5E20;color:white;border:none;border-radius:8px;padding:12px 24px;font-size:14px;cursor:pointer">Reload</button></div>';
  console.error('App error:', e);
}
  </script>
</body>
